# Detekt configuration for Msaidizi
# https://detekt.github.io/detekt/configurations.html

build:
  maxIssues: 0

complexity:
  LongMethod:
    threshold: 60
  LongParameterList:
    functionThreshold: 8
    constructorThreshold: 10
  ComplexMethod:
    threshold: 15
  TooManyFunctions:
    thresholdInFiles: 25
    thresholdInClasses: 25
  LargeClass:
    threshold: 600

style:
  MaxLineLength:
    maxLineLength: 120
  MagicNumber:
    active: false
  ReturnCount:
    max: 4
  NestedBlockDepth:
    max: 5
  ForbiddenComment:
    active: false
  WildcardImport:
    active: false
  UnusedImports:
    active: true
  UnusedPrivateMember:
    active: true
  MaxLineLength:
    maxLineLength: 150
    ignoreBackTickedIdentifier: true

naming:
  FunctionNaming:
    # Allow test function names with backticks
    functionPattern: '[a-zA-Z][a-zA-Z0-9_]*|`[^`]+`'
  TopLevelPropertyNaming:
    constantPattern: '[A-Za-z][_A-Za-z0-9]*'

exceptions:
  TooGenericExceptionCaught:
    active: false
  TooGenericExceptionThrown:
    active: false

empty-blocks:
  EmptyFunctionBlock:
    active: true
    ignoreOverridden: true

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="corpGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#15803D"/>
    </linearGradient>
    <linearGradient id="goldA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
  </defs>

  <!-- Dark background circle -->
  <circle cx="256" cy="256" r="256" fill="#0F172A"/>

  <!-- Outer ring (corporate feel) -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#22C55E" stroke-width="3" opacity="0.3"/>
  <circle cx="256" cy="256" r="195" fill="none" stroke="#22C55E" stroke-width="1" opacity="0.15"/>

  <!-- Corporate hexagonal badge -->
  <path d="M256 70
    L370 120
    L400 230
    L370 340
    L256 400
    L142 340
    L112 230
    L142 120Z"
    fill="url(#corpGrad)"
    stroke="#16A34A"
    stroke-width="2"
    stroke-linejoin="round"/>

  <!-- Inner hexagon highlight -->
  <path d="M256 95
    L355 138
    L380 232
    L355 328
    L256 378
    L157 328
    L132 232
    L157 138Z"
    fill="none"
    stroke="#4ADE80"
    stroke-width="1"
    opacity="0.2"/>

  <!-- Stylized "A" letterform -->
  <path d="M256 130
    L320 310
    L290 310
    L276 270
    L236 270
    L222 310
    L192 310Z"
    fill="#FFFFFF"
    opacity="0.95"/>

  <!-- A crossbar -->
  <path d="M240 240 L272 240 L268 252 L244 252Z"
    fill="#0F172A"
    opacity="0.9"/>

  <!-- Gold accent line under A -->
  <path d="M200 330 L312 330"
    stroke="url(#goldA)"
    stroke-width="4"
    stroke-linecap="round"/>

  <!-- Small gold diamond accent -->
  <path d="M256 345 L264 355 L256 365 L248 355Z"
    fill="#F59E0B"/>
</svg>

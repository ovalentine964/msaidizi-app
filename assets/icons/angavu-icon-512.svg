<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="corpGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#15803D"/>
    </linearGradient>
    <linearGradient id="goldA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
  </defs>

  <!-- Dark background circle -->
  <circle cx="256" cy="256" r="256" fill="#0F172A"/>

  <!-- Subtle Africa continent outline as node connection guide -->
  <path d="M240 70
    C220 73 200 80 185 90
    C175 98 168 108 162 120
    L158 138
    C155 150 153 162 152 175
    L150 192
    C148 210 150 228 155 245
    L162 265
    C168 282 178 298 190 312
    L205 328
    C218 340 235 350 252 358
    L256 360
    C260 358 277 348 290 338
    L305 322
    C318 308 328 292 335 275
    L340 258
    C345 240 348 222 348 205
    L348 188
    C348 172 346 155 342 140
    L338 125
    C332 110 324 98 314 88
    C304 78 292 72 278 68
    C268 65 256 63 248 65
    L240 70Z"
    fill="none"
    stroke="#22C55E"
    stroke-width="1.5"
    opacity="0.12"
    stroke-dasharray="4 4"/>

  <!-- Neural network nodes — arranged as Africa -->
  <!-- North Africa nodes -->
  <circle cx="230" cy="85" r="12" fill="#22C55E" opacity="0.9"/>
  <circle cx="270" cy="82" r="10" fill="#22C55E" opacity="0.8"/>
  <circle cx="305" cy="90" r="11" fill="#22C55E" opacity="0.85"/>

  <!-- West Africa nodes (bulge) -->
  <circle cx="165" cy="130" r="11" fill="#22C55E" opacity="0.85"/>
  <circle cx="155" cy="165" r="12" fill="#22C55E" opacity="0.9"/>
  <circle cx="158" cy="200" r="10" fill="#22C55E" opacity="0.8"/>
  <circle cx="165" cy="235" r="9" fill="#22C55E" opacity="0.75"/>

  <!-- East Africa / Horn -->
  <circle cx="340" cy="140" r="11" fill="#22C55E" opacity="0.85"/>
  <circle cx="348" cy="175" r="12" fill="#22C55E" opacity="0.9"/>
  <circle cx="345" cy="210" r="10" fill="#22C55E" opacity="0.8"/>

  <!-- Central Africa -->
  <circle cx="220" cy="220" r="13" fill="#22C55E" opacity="0.95"/>
  <circle cx="260" cy="215" r="11" fill="#22C55E" opacity="0.85"/>
  <circle cx="240" cy="250" r="10" fill="#22C55E" opacity="0.8"/>

  <!-- Southern Africa -->
  <circle cx="235" cy="300" r="11" fill="#22C55E" opacity="0.85"/>
  <circle cx="270" cy="295" r="12" fill="#22C55E" opacity="0.9"/>
  <circle cx="256" cy="340" r="10" fill="#22C55E" opacity="0.8"/>

  <!-- Kenya node (HQ — highlighted) -->
  <circle cx="340" cy="200" r="16" fill="#F59E0B" stroke="#FFFFFF" stroke-width="2.5"/>
  <circle cx="340" cy="200" r="8" fill="#FFFFFF"/>

  <!-- Connection lines between nodes (neural network) -->
  <!-- North connections -->
  <line x1="230" y1="85" x2="270" y2="82" stroke="#F59E0B" stroke-width="1.5" opacity="0.5"/>
  <line x1="270" y1="82" x2="305" y2="90" stroke="#F59E0B" stroke-width="1.5" opacity="0.5"/>
  <line x1="230" y1="85" x2="165" y2="130" stroke="#F59E0B" stroke-width="1.5" opacity="0.4"/>
  <line x1="305" y1="90" x2="340" y2="140" stroke="#F59E0B" stroke-width="1.5" opacity="0.4"/>

  <!-- West Africa connections -->
  <line x1="165" y1="130" x2="155" y2="165" stroke="#F59E0B" stroke-width="1.5" opacity="0.5"/>
  <line x1="155" y1="165" x2="158" y2="200" stroke="#F59E0B" stroke-width="1.5" opacity="0.5"/>
  <line x1="158" y1="200" x2="165" y2="235" stroke="#F59E0B" stroke-width="1.5" opacity="0.5"/>

  <!-- East Africa connections -->
  <line x1="340" y1="140" x2="348" y2="175" stroke="#F59E0B" stroke-width="1.5" opacity="0.5"/>
  <line x1="348" y1="175" x2="345" y2="210" stroke="#F59E0B" stroke-width="1.5" opacity="0.5"/>

  <!-- Cross-continental connections -->
  <line x1="155" y1="165" x2="220" y2="220" stroke="#F59E0B" stroke-width="1" opacity="0.3"/>
  <line x1="348" y1="175" x2="260" y2="215" stroke="#F59E0B" stroke-width="1" opacity="0.3"/>
  <line x1="220" y1="220" x2="260" y2="215" stroke="#F59E0B" stroke-width="1.5" opacity="0.5"/>
  <line x1="240" y1="250" x2="235" y2="300" stroke="#F59E0B" stroke-width="1" opacity="0.3"/>
  <line x1="270" y1="295" x2="256" y2="340" stroke="#F59E0B" stroke-width="1" opacity="0.3"/>
  <line x1="235" y1="300" x2="270" y2="295" stroke="#F59E0B" stroke-width="1.5" opacity="0.5"/>

  <!-- Kenya HQ connections (brighter) -->
  <line x1="340" y1="200" x2="260" y2="215" stroke="#FBBF24" stroke-width="2.5" opacity="0.7"/>
  <line x1="340" y1="200" x2="348" y2="175" stroke="#FBBF24" stroke-width="2.5" opacity="0.7"/>
  <line x1="340" y1="200" x2="345" y2="210" stroke="#FBBF24" stroke-width="2.5" opacity="0.7"/>
  <line x1="340" y1="200" x2="220" y2="220" stroke="#FBBF24" stroke-width="2" opacity="0.5"/>

  <!-- Company name — subtle, below -->
  <text x="256" y="410" text-anchor="middle" font-family="Inter, Plus Jakarta Sans, sans-serif" font-size="28" font-weight="700" fill="#FFFFFF" opacity="0.9">ANGAVU</text>
  <text x="256" y="435" text-anchor="middle" font-family="Inter, Plus Jakarta Sans, sans-serif" font-size="14" font-weight="400" fill="#94A3B8" letter-spacing="4">INTELLIGENCE</text>
</svg>

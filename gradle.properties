# Project-wide Gradle settings for Msaidizi
# Optimized for low-memory builds

org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
org.gradle.parallel=true
org.gradle.caching=true
# Configuration cache disabled — incompatible with data binding in AGP 8.2
# org.gradle.configuration-cache=true

# Kotlin
kotlin.code.style=official

# Android
android.useAndroidX=true
android.nonTransitiveRClass=true

# Disable unnecessary features for faster builds
android.enableR8.fullMode=false

# Kapt debugging — run in-process to surface real error messages
kapt.use.worker.api=false

# Disable Kotlin daemon to get better error output
kotlin.daemon.enabled=false

# Disable incremental compilation
kotlin.incremental=false

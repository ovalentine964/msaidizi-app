# ============================================================
# OPTION A + D: Kotlin 2.0.x + KSP + JDK 21
# ============================================================
# The "nuclear" option — complete modernization of the build stack.
# Use this if Option B (KSP-only) doesn't resolve the issue.
#
# Changes:
#   - Kotlin 2.0.21 + KSP 2.0.21-1.0.28
#   - JDK 21 (optimal for Kotlin 2.0.x)
#   - Gradle 8.7
#   - All kapt artifacts replaced with KSP
#   - Updated coroutines and serialization for Kotlin 2.0 compat
# ============================================================

name: Build (Kotlin 2.0 + KSP)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Validate Build
        run: |
          chmod +x scripts/validate-build.sh
          ./scripts/validate-build.sh

      - name: Check Room Entity Registration
        run: python3 scripts/check-room-entities.py

  build:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Switch to Kotlin 2.0 build files
        run: |
          cp build.gradle.kts.kotlin2 build.gradle.kts
          cp app/build.gradle.kts.kotlin2 app/build.gradle.kts

      - name: Update gradle-wrapper for 8.7
        run: |
          sed -i 's|gradle-8.5-bin.zip|gradle-8.7-bin.zip|' gradle/wrapper/gradle-wrapper.properties

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-kotlin2-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-kotlin2-${{ runner.os }}-

      - name: Build Debug APK
        run: |
          set -o pipefail
          gradle assembleDebug --stacktrace --info --no-daemon 2>&1 | tee build-debug.log
          echo "Gradle exit code: $?"

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-debug-log-kotlin2
          path: build-debug.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: msaidizi-debug-kotlin2
          path: app/build/outputs/apk/debug/*.apk

      - name: Rename APK for release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          mkdir -p release-apk
          cp app/build/outputs/apk/debug/*.apk release-apk/msaidizi.apk
          ls -lh release-apk/

      - name: Attach APK to Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          files: release-apk/msaidizi.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

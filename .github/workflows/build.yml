name: Build and Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Validate Build
        run: |
          chmod +x scripts/validate-build.sh
          ./scripts/validate-build.sh

      - name: Check Room Entity Registration
        run: python3 scripts/check-room-entities.py

      - name: Check kapt Compatibility
        run: python3 scripts/check-kapt-compat.py

  build:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: |
            ~/android-sdk
            ~/.android
          key: android-sdk-${{ runner.os }}-${{ hashFiles('app/build.gradle.kts') }}
          restore-keys: |
            android-sdk-${{ runner.os }}-

      - name: Build Debug APK
        run: |
          set -o pipefail
          gradle assembleDebug --stacktrace --info -Dkotlin.daemon.enabled=false 2>&1 | tee build-debug.log
          echo "Gradle exit code: $?"

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-debug-log
          path: build-debug.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: msaidizi-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Rename APK for release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          mkdir -p release-apk
          cp app/build/outputs/apk/debug/*.apk release-apk/msaidizi.apk
          echo "APK ready: release-apk/msaidizi.apk"
          ls -lh release-apk/

      - name: Attach APK to Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          files: release-apk/msaidizi.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

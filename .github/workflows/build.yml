name: Build Msaidizi APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Verify APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install NDK r26b and CMake 3.22.1
        run: |
          # Install NDK r26b (26.1.10909125) and CMake 3.22.1
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;26.1.10909125" \
            "cmake;3.22.1"
          echo "✅ NDK r26b and CMake 3.22.1 installed"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Generate debug keystore
        run: |
          keytool -genkeypair -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Msaidizi,C=KE"
          echo "✅ Debug keystore generated"

      - name: Decode release keystore
        if: env.RELEASE_KEYSTORE_BASE64 != ''
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > release.keystore
          echo "✅ Release keystore decoded"
          echo "RELEASE_KEYSTORE_FILE=release.keystore" >> $GITHUB_ENV
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}

      - name: Cache AI models
        id: cache-models
        uses: actions/cache@v4
        with:
          path: app/src/main/assets/models
          key: models-v1-whisper-piper-qwen

      - name: Download AI Models
        if: steps.cache-models.outputs.cache-hit != 'true'
        run: |
          chmod +x scripts/download-models.sh
          ./scripts/download-models.sh
        timeout-minutes: 30

      - name: Verify models present
        run: |
          chmod +x scripts/download-models.sh
          ./scripts/download-models.sh --verify

      - name: Build Debug APK
        run: |
          set -o pipefail
          ./gradlew assembleDebug --stacktrace --info 2>&1 | tee build-debug.log
          echo "Gradle exit code: $?"

      - name: Build Release APK
        run: |
          set -o pipefail
          ./gradlew assembleRelease --stacktrace --info 2>&1 | tee build-release.log
          echo "Gradle exit code: $?"
        env:
          RELEASE_KEYSTORE_FILE: ${{ env.RELEASE_KEYSTORE_FILE }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Verify debug APK signing
        run: |
          APK_PATH=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          if [ -n "$APK_PATH" ]; then
            echo "📋 Verifying debug APK signature..."
            ${ANDROID_HOME}/build-tools/$(ls ${ANDROID_HOME}/build-tools/ | sort -V | tail -1)/apksigner verify --print-certs "$APK_PATH"
            echo "✅ Debug APK signing verified"
          fi

      - name: Verify release APK signing
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -n "$APK_PATH" ]; then
            echo "📋 Verifying release APK signature..."
            ${ANDROID_HOME}/build-tools/$(ls ${ANDROID_HOME}/build-tools/ | sort -V | tail -1)/apksigner verify --print-certs "$APK_PATH"
            echo ""
            ${ANDROID_HOME}/build-tools/$(ls ${ANDROID_HOME}/build-tools/ | sort -V | tail -1)/apksigner verify -v "$APK_PATH" 2>&1 || true
            echo "✅ Release APK signing verified"
          else
            echo "❌ No release APK found"
            exit 1
          fi

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build-debug.log
            build-release.log

      - name: Check APK size
        run: |
          APK_PATH=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          if [ -n "$APK_PATH" ]; then
            SIZE=$(stat -c%s "$APK_PATH")
            SIZE_MB=$((SIZE / 1048576))
            echo "📦 APK size: ${SIZE_MB}MB"
            ls -lh "$APK_PATH"
            if [ "$SIZE_MB" -lt 100 ]; then
              echo "⚠️  WARNING: APK is only ${SIZE_MB}MB — models may not be bundled!"
            fi
          fi

      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: msaidizi-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

      - name: Upload Release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: msaidizi-release-${{ github.sha }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 14

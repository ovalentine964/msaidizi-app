name: Build Msaidizi APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true"
  NDK_VERSION: "26.1.10909125"
  CMAKE_VERSION: "3.22.1"

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache NDK & CMake
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}
            ${{ env.ANDROID_HOME }}/cmake/${{ env.CMAKE_VERSION }}
          key: ndk-cmake-${{ env.NDK_VERSION }}-${{ env.CMAKE_VERSION }}

      - name: Install NDK r26b and CMake 3.22.1
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;${{ env.NDK_VERSION }}" \
            "cmake;${{ env.CMAKE_VERSION }}"
          echo "✅ NDK r26b and CMake 3.22.1 installed"

      - name: Set NDK environment
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV

      - name: Generate debug keystore
        run: |
          keytool -genkeypair -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Msaidizi,C=KE"
          echo "✅ Debug keystore generated"

      - name: Cache AI models
        id: cache-models
        uses: actions/cache@v4
        with:
          path: app/src/main/assets/models
          key: models-v3-whisper-piper-qwen35-08b

      - name: Download AI Models
        if: steps.cache-models.outputs.cache-hit != 'true'
        run: |
          chmod +x scripts/download-models.sh
          ./scripts/download-models.sh
        timeout-minutes: 30

      - name: Verify models present
        run: |
          chmod +x scripts/download-models.sh
          ./scripts/download-models.sh --verify

      # ============================================================
      # Sherpa-ONNX JNI libs setup (ASR/TTS/VAD engine)
      # ============================================================
      - name: Cache sherpa-onnx JNI libs
        id: cache-sherpa
        uses: actions/cache@v4
        with:
          path: app/src/main/jniLibs
          key: sherpa-onnx-jni-v1-arm64

      - name: Setup sherpa-onnx JNI libs
        if: steps.cache-sherpa.outputs.cache-hit != 'true'
        run: |
          chmod +x scripts/setup-sherpa-onnx.sh
          ./scripts/setup-sherpa-onnx.sh
        timeout-minutes: 15

      - name: Verify sherpa-onnx JNI libs
        run: |
          JNI_DIR="app/src/main/jniLibs/arm64-v8a"
          echo "🔍 Checking sherpa-onnx JNI libs in $JNI_DIR ..."

          REQUIRED_LIBS=(
            "libsherpa-onnx-jni.so"
            "libonnxruntime.so"
          )

          MISSING=0
          for lib in "${REQUIRED_LIBS[@]}"; do
            if [ -f "$JNI_DIR/$lib" ]; then
              SIZE=$(stat -c%s "$JNI_DIR/$lib")
              echo "  ✅ $lib ($(( SIZE / 1024 )) KB)"
            else
              echo "  ❌ MISSING: $lib"
              MISSING=$((MISSING + 1))
            fi
          done

          if [ "$MISSING" -gt 0 ]; then
            echo "::error::$MISSING required sherpa-onnx JNI lib(s) missing!"
            echo "Contents of $JNI_DIR:"
            ls -la "$JNI_DIR/" 2>/dev/null || echo "  (directory does not exist)"
            exit 1
          fi

          # Also check Kotlin API source files exist
          SHERPA_KT_DIR="app/src/main/java/com/k2fsa/sherpa/onnx"
          if [ -d "$SHERPA_KT_DIR" ]; then
            KT_COUNT=$(find "$SHERPA_KT_DIR" -name "*.kt" | wc -l)
            echo "  ✅ Sherpa Kotlin API: $KT_COUNT .kt files in $SHERPA_KT_DIR"
          else
            echo "  ⚠️  Sherpa Kotlin API dir not found at $SHERPA_KT_DIR"
            echo "     (setup-sherpa-onnx.sh should also install these)"
          fi

          echo "✅ sherpa-onnx JNI verification passed"

      - name: Build Debug APK
        run: |
          echo "🔧 Starting Gradle build..."
          echo "   NDK_HOME=$ANDROID_NDK_HOME"
          echo "   JNI libs:"
          ls -la app/src/main/jniLibs/arm64-v8a/ 2>/dev/null || echo "   (no jniLibs found)"
          echo ""

          set -o pipefail
          ./gradlew assembleDebug --stacktrace --info 2>&1 | tee build-debug.log
          EXIT_CODE=${PIPESTATUS[0]}
          if [ "$EXIT_CODE" -ne 0 ]; then
            echo ""
            echo "::error::Gradle assembleDebug failed with exit code $EXIT_CODE"
            echo ""
            echo "=== Last 50 lines of build log ==="
            tail -50 build-debug.log
            echo ""
            echo "=== Searching for compilation errors ==="
            grep -i "error:" build-debug.log | head -20 || true
            grep -i "FAILED" build-debug.log | head -10 || true
            exit "$EXIT_CODE"
          fi
          echo "✅ Gradle build succeeded"

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-debug-log
          path: build-debug.log

      - name: Check APK size
        run: |
          APK_PATH=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          if [ -n "$APK_PATH" ]; then
            SIZE=$(stat -c%s "$APK_PATH")
            SIZE_MB=$((SIZE / 1048576))
            echo "📦 APK size: ${SIZE_MB}MB"
            ls -lh "$APK_PATH"
            if [ "$SIZE_MB" -lt 100 ]; then
              echo "::warning::APK is only ${SIZE_MB}MB — models may not be bundled!"
            fi
            if [ "$SIZE_MB" -gt 2048 ]; then
              echo "::error::APK is ${SIZE_MB}MB — exceeds 2GB limit"
              exit 1
            fi
          else
            echo "::error::No APK found at app/build/outputs/apk/debug/"
            exit 1
          fi

      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: msaidizi-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

  # ============================================================
  # Release Build — properly signed, Play Protect safe
  # ============================================================
  release:
    name: Build Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 90
    # Only run on pushes to main or manual dispatch (not on PRs)
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache NDK & CMake
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}
            ${{ env.ANDROID_HOME }}/cmake/${{ env.CMAKE_VERSION }}
          key: ndk-cmake-${{ env.NDK_VERSION }}-${{ env.CMAKE_VERSION }}

      - name: Install NDK r26b and CMake 3.22.1
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;${{ env.NDK_VERSION }}" \
            "cmake;${{ env.CMAKE_VERSION }}"
          echo "✅ NDK r26b and CMake 3.22.1 installed"

      - name: Set NDK environment
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV

      - name: Decode release keystore (or fall back to debug keystore)
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > release.keystore
            echo "✅ Release keystore decoded from secret"
            # Set env vars for Gradle signing config
            echo "RELEASE_KEYSTORE_FILE=release.keystore" >> $GITHUB_ENV
          else
            echo "⚠️  No RELEASE_KEYSTORE_BASE64 secret — falling back to debug keystore"
            echo "   (Play Protect will recognize the debug certificate)"
            keytool -genkeypair -v \
              -keystore release.keystore \
              -alias androiddebugkey \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass android \
              -keypass android \
              -dname "CN=Android Debug,O=Android,C=US"
            echo "✅ Generated debug-compatible keystore for release signing"
            echo "RELEASE_KEYSTORE_FILE=release.keystore" >> $GITHUB_ENV
            echo "RELEASE_STORE_PASSWORD=android" >> $GITHUB_ENV
            echo "RELEASE_KEY_ALIAS=androiddebugkey" >> $GITHUB_ENV
            echo "RELEASE_KEY_PASSWORD=android" >> $GITHUB_ENV
          fi

      - name: Cache AI models
        id: cache-models
        uses: actions/cache@v4
        with:
          path: app/src/main/assets/models
          key: models-v3-whisper-piper-qwen35-08b

      - name: Download AI Models
        if: steps.cache-models.outputs.cache-hit != 'true'
        run: |
          chmod +x scripts/download-models.sh
          ./scripts/download-models.sh
        timeout-minutes: 30

      - name: Verify models present
        run: |
          chmod +x scripts/download-models.sh
          ./scripts/download-models.sh --verify

      - name: Cache sherpa-onnx JNI libs
        id: cache-sherpa
        uses: actions/cache@v4
        with:
          path: app/src/main/jniLibs
          key: sherpa-onnx-jni-v1-arm64

      - name: Setup sherpa-onnx JNI libs
        if: steps.cache-sherpa.outputs.cache-hit != 'true'
        run: |
          chmod +x scripts/setup-sherpa-onnx.sh
          ./scripts/setup-sherpa-onnx.sh
        timeout-minutes: 15

      - name: Verify sherpa-onnx JNI libs
        run: |
          JNI_DIR="app/src/main/jniLibs/arm64-v8a"
          echo "🔍 Checking sherpa-onnx JNI libs in $JNI_DIR ..."

          REQUIRED_LIBS=(
            "libsherpa-onnx-jni.so"
            "libonnxruntime.so"
          )

          MISSING=0
          for lib in "${REQUIRED_LIBS[@]}"; do
            if [ -f "$JNI_DIR/$lib" ]; then
              SIZE=$(stat -c%s "$JNI_DIR/$lib")
              echo "  ✅ $lib ($(( SIZE / 1024 )) KB)"
            else
              echo "  ❌ MISSING: $lib"
              MISSING=$((MISSING + 1))
            fi
          done

          if [ "$MISSING" -gt 0 ]; then
            echo "::error::$MISSING required sherpa-onnx JNI lib(s) missing!"
            exit 1
          fi

          SHERPA_KT_DIR="app/src/main/java/com/k2fsa/sherpa/onnx"
          if [ -d "$SHERPA_KT_DIR" ]; then
            KT_COUNT=$(find "$SHERPA_KT_DIR" -name "*.kt" | wc -l)
            echo "  ✅ Sherpa Kotlin API: $KT_COUNT .kt files in $SHERPA_KT_DIR"
          fi

          echo "✅ sherpa-onnx JNI verification passed"

      - name: Build Release APK
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          echo "🔧 Starting Gradle release build..."
          echo "   NDK_HOME=$ANDROID_NDK_HOME"
          echo ""

          set -o pipefail
          ./gradlew assembleRelease --stacktrace --info 2>&1 | tee build-release.log
          EXIT_CODE=${PIPESTATUS[0]}
          if [ "$EXIT_CODE" -ne 0 ]; then
            echo ""
            echo "::error::Gradle assembleRelease failed with exit code $EXIT_CODE"
            echo ""
            echo "=== Last 50 lines of build log ==="
            tail -50 build-release.log
            echo ""
            echo "=== Searching for compilation errors ==="
            grep -i "error:" build-release.log | head -20 || true
            grep -i "FAILED" build-release.log | head -10 || true
            exit "$EXIT_CODE"
          fi
          echo "✅ Gradle release build succeeded"

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-release-log
          path: build-release.log

      - name: Check APK size
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -n "$APK_PATH" ]; then
            SIZE=$(stat -c%s "$APK_PATH")
            SIZE_MB=$((SIZE / 1048576))
            echo "📦 Release APK size: ${SIZE_MB}MB"
            ls -lh "$APK_PATH"
            if [ "$SIZE_MB" -lt 100 ]; then
              echo "::warning::APK is only ${SIZE_MB}MB — models may not be bundled!"
            fi
            if [ "$SIZE_MB" -gt 2048 ]; then
              echo "::error::APK is ${SIZE_MB}MB — exceeds 2GB limit"
              exit 1
            fi
          else
            echo "::error::No APK found at app/build/outputs/apk/release/"
            exit 1
          fi

      - name: Rename release APK
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -n "$APK_PATH" ]; then
            cp "$APK_PATH" msaidizi-release.apk
            echo "✅ Renamed to msaidizi-release.apk"
          fi

      - name: Upload Release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: msaidizi-release-${{ github.sha }}
          path: msaidizi-release.apk
          retention-days: 30

      - name: Cleanup keystore
        if: always()
        run: |
          rm -f release.keystore
          echo "🧹 Keystore cleaned up"

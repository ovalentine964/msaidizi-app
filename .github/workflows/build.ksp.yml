# ============================================================
# OPTION B + D: KSP Migration + CI Environment Fix
# ============================================================
# Changes from build.yml:
#   - Uses KSP build files (gradle.ksp → gradle.kts)
#   - JDK 17 → JDK 21 (better Kotlin 2.0 support, not required but recommended)
#   - Gradle 8.5 → 8.7 (better KSP support)
#   - Removed all kapt-specific flags (-Dkapt.use.worker.api=false etc.)
#   - Removed kapt daemon cache cleanup
# ============================================================

name: Build (KSP)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Validate Build
        run: |
          chmod +x scripts/validate-build.sh
          ./scripts/validate-build.sh

      - name: Check Room Entity Registration
        run: python3 scripts/check-room-entities.py

      # Note: check-kapt-compat.py is no longer needed with KSP
      # kapt-specific checks can be removed from CI

  build:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Switch to KSP build files
        run: |
          # Swap in KSP build files
          cp build.gradle.ksp build.gradle.kts
          cp app/build.gradle.ksp app/build.gradle.kts

      - name: Update gradle-wrapper for 8.7
        run: |
          sed -i 's|gradle-8.5-bin.zip|gradle-8.7-bin.zip|' gradle/wrapper/gradle-wrapper.properties

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-ksp-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-ksp-${{ runner.os }}-

      - name: Build Debug APK
        run: |
          set -o pipefail
          # No kapt flags needed — KSP runs as a Kotlin compiler plugin
          gradle assembleDebug --stacktrace --info --no-daemon 2>&1 | tee build-debug.log
          echo "Gradle exit code: $?"

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-debug-log-ksp
          path: build-debug.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: msaidizi-debug-ksp
          path: app/build/outputs/apk/debug/*.apk

      - name: Rename APK for release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          mkdir -p release-apk
          cp app/build/outputs/apk/debug/*.apk release-apk/msaidizi.apk
          echo "APK ready: release-apk/msaidizi.apk"
          ls -lh release-apk/

      - name: Attach APK to Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          files: release-apk/msaidizi.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

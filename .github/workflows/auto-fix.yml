name: Auto-Fix Build Issues

on:
  push:
    branches: [main, develop]
    paths:
      - 'app/src/main/java/**/*.kt'
      - 'app/src/main/res/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: autofix-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true"
  NDK_VERSION: "26.1.10909125"
  CMAKE_VERSION: "3.22.1"
  MODEL_CACHE_KEY: "models-v7-sherpa-v1"

jobs:
  auto-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run auto-fix script
        id: autofix
        run: |
          if [ ! -f scripts/auto-fix-build.sh ]; then
            echo "âš ď¸Ź  scripts/auto-fix-build.sh not found â€” skipping auto-fix"
            echo "fixes_applied=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          chmod +x scripts/auto-fix-build.sh
          set +e
          OUTPUT=$(bash scripts/auto-fix-build.sh 2>&1)
          EXIT_CODE=$?
          set -e

          echo "$OUTPUT"
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"

          if [ $EXIT_CODE -eq 1 ]; then
            echo "fixes_applied=true" >> "$GITHUB_OUTPUT"
            echo "đź”§ Auto-fixes were applied"
          else
            echo "fixes_applied=false" >> "$GITHUB_OUTPUT"
            echo "âś… No fixes needed"
          fi

      - name: Commit auto-fixes
        if: steps.autofix.outputs.fixes_applied == 'true'
        run: |
          git config user.name "Msaidizi Bot"
          git config user.email "bot@msaidizi.app"

          # Stage all changes
          git add -u

          # Check if there are changes to commit
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "đź”§ auto-fix: resolve build issues automatically

            Auto-fixed by CI:
            - Removed @Serializable from @Entity classes
            - Registered missing Room entities in @Database
            - Renamed duplicate class names
            - Removed duplicate string resources
            - Bumped database version

            [skip ci]"

            git push
            echo "âś… Auto-fixes committed and pushed"
          fi

      - name: Run Room entity check
        run: |
          if [ -f scripts/check-room-entities.py ]; then
            python3 scripts/check-room-entities.py
          else
            echo "âš ď¸Ź  scripts/check-room-entities.py not found â€” skipping"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache NDK & CMake
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}
            ${{ env.ANDROID_HOME }}/cmake/${{ env.CMAKE_VERSION }}
          key: ndk-cmake-${{ env.NDK_VERSION }}-${{ env.CMAKE_VERSION }}

      - name: Install NDK r26b and CMake 3.22.1
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;${{ env.NDK_VERSION }}" \
            "cmake;${{ env.CMAKE_VERSION }}"

      - name: Set NDK environment
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV

      - name: Cache CMake FetchContent (llama.cpp)
        uses: actions/cache@v4
        with:
          path: app/.cxx
          key: cmake-cxx-llama-b4651-${{ env.NDK_VERSION }}

      - name: Ensure debug keystore exists
        run: |
          if [ -f debug.keystore ]; then
            echo "âś… Using committed debug.keystore"
          else
            echo "âš ď¸Ź  Generating debug.keystore"
            keytool -genkeypair -v \
              -keystore debug.keystore \
              -alias androiddebugkey \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass android \
              -keypass android \
              -dname "CN=Android Debug,O=Msaidizi,C=KE"
            echo "âś… Debug keystore generated"
          fi

      - name: Cache AI models
        id: cache-models
        uses: actions/cache@v4
        with:
          path: app/src/main/assets/models
          key: ${{ env.MODEL_CACHE_KEY }}

      - name: Download AI Models
        if: steps.cache-models.outputs.cache-hit != 'true'
        run: |
          chmod +x scripts/download-models.sh
          ./scripts/download-models.sh
        timeout-minutes: 30

      - name: Cache sherpa-onnx JNI libs
        id: cache-sherpa
        uses: actions/cache@v4
        with:
          path: app/src/main/jniLibs
          key: sherpa-onnx-jni-v2-all

      - name: Setup sherpa-onnx JNI libs
        if: steps.cache-sherpa.outputs.cache-hit != 'true'
        run: |
          chmod +x scripts/setup-sherpa-onnx.sh
          ./scripts/setup-sherpa-onnx.sh
        timeout-minutes: 15

      - name: Build Debug APK
        run: |
          set -o pipefail
          ./gradlew assembleFullDebug --stacktrace --info 2>&1 | tee build-debug.log
          EXIT_CODE=${PIPESTATUS[0]}
          if [ "$EXIT_CODE" -ne 0 ]; then
            echo "::error::Gradle assembleFullDebug failed with exit code $EXIT_CODE"
            exit "$EXIT_CODE"
          fi

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-debug-log
          path: build-debug.log

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: msaidizi-debug
          path: app/build/outputs/apk/full/debug/*.apk

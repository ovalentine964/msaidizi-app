name: Pre-Commit Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Validate Build
        run: |
          if [ -f scripts/validate-build.sh ]; then
            chmod +x scripts/validate-build.sh
            ./scripts/validate-build.sh
          else
            echo "::warning::scripts/validate-build.sh not found — skipping"
          fi

      - name: Check Kotlin files exist
        run: |
          count=$(find app/src -name "*.kt" -exec grep -l "import\|class\|fun" {} \; | wc -l)
          echo "Found $count Kotlin source files"
          if [ "$count" -eq 0 ]; then
            echo "::error::No Kotlin source files found"
            exit 1
          fi

name: Pre-Commit Validation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Validate Build (all checks)
        run: |
          chmod +x scripts/validate-build.sh
          ./scripts/validate-build.sh

      - name: Check Kotlin source files exist
        run: |
          count=$(find app/src -name "*.kt" -exec grep -l "import\|class\|fun" {} \; | wc -l)
          echo "Found $count Kotlin source files"
          [ "$count" -gt 0 ]

  room-entities:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Check Room Entity Registration
        run: |
          chmod +x scripts/check-room-entities.py
          python3 scripts/check-room-entities.py

  kapt-compat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Check kapt Compatibility
        run: |
          chmod +x scripts/check-kapt-compat.py
          python3 scripts/check-kapt-compat.py

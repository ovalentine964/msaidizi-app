name: CI Pipeline — Hardened

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true"
  JAVA_VERSION: "17"
  NDK_VERSION: "26.1.10909125"
  CMAKE_VERSION: "3.22.1"
  MODEL_CACHE_KEY: "models-v8-lite"

jobs:
  # ──────────────────────────────────────
  # 1. Secret Detection (gate everything)
  # ──────────────────────────────────────
  secret-scan:
    name: 🔒 Secret Detection
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@main
        continue-on-error: true
        with:
          extra_args: --only-verified

  # ──────────────────────────────────────
  # 2. Lint & Static Analysis (Detekt)
  # ──────────────────────────────────────
  lint:
    name: 🧹 Detekt Lint + Security
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [secret-scan]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Run Detekt
        run: |
          set -o pipefail
          ./gradlew detektMain detektTest --continue 2>&1 | tee detekt-output.txt
          DETEKT_EXIT=${PIPESTATUS[0]}
          # Fail on findings with severity=error (security rules are error-level)
          if grep -q "Severity.*error" detekt-output.txt; then
            echo "::error::Detekt found security/style errors"
            exit 1
          fi
          exit $DETEKT_EXIT
        continue-on-error: true

      - name: Upload Detekt reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-reports
          path: |
            build/reports/detekt/
            detekt-output.txt

  # ──────────────────────────────────────
  # 3. Unit Tests with Coverage Gate
  # ──────────────────────────────────────
  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [secret-scan]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Cache NDK & CMake
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}
            ${{ env.ANDROID_HOME }}/cmake/${{ env.CMAKE_VERSION }}
          key: ndk-cmake-${{ env.NDK_VERSION }}-${{ env.CMAKE_VERSION }}

      - name: Install NDK r26b and CMake 3.22.1
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;${{ env.NDK_VERSION }}" \
            "cmake;${{ env.CMAKE_VERSION }}"

      - name: Set NDK environment
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV

      - name: Cache CMake FetchContent (llama.cpp)
        uses: actions/cache@v4
        with:
          path: app/.cxx
          key: cmake-cxx-llama-b4651-${{ env.NDK_VERSION }}

      - name: Cache sherpa-onnx JNI libs
        id: cache-sherpa
        uses: actions/cache@v4
        with:
          path: app/src/main/jniLibs
          key: sherpa-onnx-jni-v2-all

      - name: Setup sherpa-onnx JNI libs
        if: steps.cache-sherpa.outputs.cache-hit != 'true'
        run: |
          chmod +x scripts/setup-sherpa-onnx.sh
          ./scripts/setup-sherpa-onnx.sh
        timeout-minutes: 15

      - name: Cache AI models
        id: cache-models
        uses: actions/cache@v4
        with:
          path: app/src/main/assets/models
          key: ${{ env.MODEL_CACHE_KEY }}

      - name: Download AI Models
        if: steps.cache-models.outputs.cache-hit != 'true'
        run: |
          chmod +x scripts/download-models.sh
          ./scripts/download-models.sh --lite
        timeout-minutes: 15

      - name: Run Unit Tests
        run: ./gradlew testLiteDebugUnitTest --stacktrace
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            app/build/reports/tests/
            app/build/reports/jacoco/

  # ──────────────────────────────────────
  # 4. OWASP Dependency Check
  # ──────────────────────────────────────
  dependency-check:
    name: 🔍 OWASP Dependency Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [secret-scan]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Cache OWASP Dependency-Check
        id: cache-owasp
        uses: actions/cache@v4
        with:
          path: dependency-check-data
          key: owasp-dc-data-${{ runner.os }}

      - name: Download OWASP Dependency-Check
        run: |
          curl -sSL https://github.com/jeremylong/DependencyCheck/releases/download/v10.0.4/dependency-check-10.0.4-release.zip -o dc.zip
          unzip -q dc.zip
          chmod +x dependency-check/bin/dependency-check.sh

      - name: Run Dependency Check
        run: |
          ./dependency-check/bin/dependency-check.sh \
            --project "msaidizi-app" \
            --scan . \
            --out dependency-check-report \
            --format HTML \
            --format JSON \
            --data dependency-check-data \
            --failOnCVSS 7 \
            --enableExperimental \
            --suppressionFile .github/dependency-check-suppressions.xml 2>&1 || true

          # Parse results
          if [ -f dependency-check-report/dependency-check-report.json ]; then
            HIGH=$(python3 -c "
          import json
          data = json.load(open('dependency-check-report/dependency-check-report.json'))
          vulns = data.get('dependencies', [])
          count = sum(1 for d in vulns if any(
              v.get('cvssv3', {}).get('baseSeverity') in ('HIGH', 'CRITICAL')
              for v in d.get('vulnerabilities', [])
          ))
          print(count)
          ")
            echo "High/Critical vulnerabilities: $HIGH"
            if [ "$HIGH" -gt 5 ]; then
              echo "::error::Too many high/critical dependency vulnerabilities ($HIGH)"
              exit 1
            fi
          fi

      - name: Upload dependency check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: dependency-check-report/
          retention-days: 14

  # ──────────────────────────────────────
  # 5. Build Debug APK
  # ──────────────────────────────────────
  build:
    name: 🏗️ Build Debug
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [secret-scan]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Cache NDK & CMake
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}
            ${{ env.ANDROID_HOME }}/cmake/${{ env.CMAKE_VERSION }}
          key: ndk-cmake-${{ env.NDK_VERSION }}-${{ env.CMAKE_VERSION }}

      - name: Install NDK r26b and CMake 3.22.1
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;${{ env.NDK_VERSION }}" \
            "cmake;${{ env.CMAKE_VERSION }}"
          echo "✅ NDK r26b and CMake 3.22.1 installed"

      - name: Ensure debug keystore exists
        run: |
          if [ -f debug.keystore ]; then
            echo "✅ Using committed debug.keystore"
          else
            echo "⚠️  No committed debug.keystore — generating one"
            keytool -genkeypair -v \
              -keystore debug.keystore \
              -alias androiddebugkey \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass android \
              -keypass android \
              -dname "CN=Android Debug,O=Msaidizi,C=KE"
            echo "✅ Debug keystore generated"
          fi

      - name: Cache AI models
        id: cache-models
        uses: actions/cache@v4
        with:
          path: app/src/main/assets/models
          key: ${{ env.MODEL_CACHE_KEY }}

      - name: Download AI Models
        if: steps.cache-models.outputs.cache-hit != 'true'
        run: |
          chmod +x scripts/download-models.sh
          ./scripts/download-models.sh --lite
        timeout-minutes: 15

      - name: Verify models present
        run: |
          chmod +x scripts/download-models.sh
          ./scripts/download-models.sh --lite --verify

      - name: Set NDK environment
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV

      - name: Cache sherpa-onnx JNI libs
        id: cache-sherpa
        uses: actions/cache@v4
        with:
          path: app/src/main/jniLibs
          key: sherpa-onnx-jni-v2-all

      - name: Setup sherpa-onnx JNI libs
        if: steps.cache-sherpa.outputs.cache-hit != 'true'
        run: |
          chmod +x scripts/setup-sherpa-onnx.sh
          ./scripts/setup-sherpa-onnx.sh
        timeout-minutes: 15

      - name: Verify sherpa-onnx JNI libs
        run: |
          JNI_DIR="app/src/main/jniLibs/arm64-v8a"
          echo "🔍 Checking sherpa-onnx JNI libs in $JNI_DIR ..."
          REQUIRED_LIBS=("libsherpa-onnx-jni.so" "libonnxruntime.so")
          MISSING=0
          for lib in "${REQUIRED_LIBS[@]}"; do
            if [ -f "$JNI_DIR/$lib" ]; then
              SIZE=$(stat -c%s "$JNI_DIR/$lib")
              echo "  ✅ $lib ($(( SIZE / 1024 )) KB)"
            else
              echo "  ❌ MISSING: $lib"
              MISSING=$((MISSING + 1))
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            echo "::error::$MISSING required sherpa-onnx JNI lib(s) missing!"
            exit 1
          fi
          echo "✅ sherpa-onnx JNI verification passed"

      - name: Build Debug APK
        run: |
          echo "🔧 Starting Gradle build..."
          echo "   NDK_HOME=$ANDROID_NDK_HOME"
          set -o pipefail
          ./gradlew assembleLiteDebug --stacktrace 2>&1 | tee build-debug.log
          EXIT_CODE=${PIPESTATUS[0]}
          if [ "$EXIT_CODE" -ne 0 ]; then
            echo ""
            echo "::error::Gradle assembleLiteDebug failed with exit code $EXIT_CODE"
            echo ""
            echo "=== Last 50 lines of build log ==="
            tail -50 build-debug.log
            echo ""
            echo "=== Searching for compilation errors ==="
            grep -i "error:" build-debug.log | head -20 || true
            grep -i "FAILED" build-debug.log | head -10 || true
            exit "$EXIT_CODE"
          fi
          echo "✅ Gradle build succeeded"

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-debug-log
          path: build-debug.log

      - name: Check APK size (< 2GB)
        run: |
          APK_PATH=$(find app/build/outputs/apk/lite/debug/ -name "*.apk" | head -1)
          if [ -n "$APK_PATH" ]; then
            APK_SIZE=$(stat -c%s "$APK_PATH")
            SIZE_MB=$((APK_SIZE / 1048576))
            echo "APK size: ${SIZE_MB}MB (limit: 2048MB)"
            if [ "$APK_SIZE" -gt $((2048 * 1024 * 1024)) ]; then
              echo "::error::APK size ${SIZE_MB}MB exceeds 2GB limit"
              exit 1
            fi
            if [ "$SIZE_MB" -lt 100 ]; then
              echo "::warning::APK is only ${SIZE_MB}MB — models may not be bundled!"
            fi
            echo "✅ APK size OK"
          else
            echo "::error::No APK found"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/lite/debug/*.apk
          retention-days: 14

  # ──────────────────────────────────────
  # 6. Signed Release Build (main only)
  # ──────────────────────────────────────
  release-build:
    name: 🚀 Signed Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@v4

      - name: Set NDK environment
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV

      - name: Cache NDK & CMake
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}
            ${{ env.ANDROID_HOME }}/cmake/${{ env.CMAKE_VERSION }}
          key: ndk-cmake-${{ env.NDK_VERSION }}-${{ env.CMAKE_VERSION }}

      - name: Install NDK r26b and CMake 3.22.1
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;${{ env.NDK_VERSION }}" \
            "cmake;${{ env.CMAKE_VERSION }}"
          echo "✅ NDK r26b and CMake 3.22.1 installed"

      - name: Cache CMake FetchContent (llama.cpp)
        uses: actions/cache@v4
        with:
          path: app/.cxx
          key: cmake-cxx-llama-b4651-${{ env.NDK_VERSION }}

      - name: Cache AI models
        id: cache-models
        uses: actions/cache@v4
        with:
          path: app/src/main/assets/models
          key: ${{ env.MODEL_CACHE_KEY }}

      - name: Download AI Models
        if: steps.cache-models.outputs.cache-hit != 'true'
        run: |
          chmod +x scripts/download-models.sh
          ./scripts/download-models.sh --lite
        timeout-minutes: 15

      - name: Verify models present
        run: |
          chmod +x scripts/download-models.sh
          ./scripts/download-models.sh --lite --verify

      - name: Cache sherpa-onnx JNI libs
        id: cache-sherpa
        uses: actions/cache@v4
        with:
          path: app/src/main/jniLibs
          key: sherpa-onnx-jni-v2-all

      - name: Setup sherpa-onnx JNI libs
        if: steps.cache-sherpa.outputs.cache-hit != 'true'
        run: |
          chmod +x scripts/setup-sherpa-onnx.sh
          ./scripts/setup-sherpa-onnx.sh
        timeout-minutes: 15

      - name: Decode release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          if [ -n "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > /tmp/release.keystore.p12
            echo "✅ PKCS12 keystore decoded from secret"
            echo "RELEASE_KEYSTORE_FILE=/tmp/release.keystore.p12" >> $GITHUB_ENV
            echo "RELEASE_STORE_PASSWORD=$RELEASE_STORE_PASSWORD" >> $GITHUB_ENV
            echo "RELEASE_KEY_ALIAS=$RELEASE_KEY_ALIAS" >> $GITHUB_ENV
            echo "RELEASE_KEY_PASSWORD=$RELEASE_KEY_PASSWORD" >> $GITHUB_ENV
          else
            echo "⚠️  No release keystore secret — using debug keystore fallback"
          fi

      - name: Build Signed Release APK
        env:
          RELEASE_KEYSTORE_FILE: /tmp/release.keystore.p12
        run: |
          set -o pipefail
          ./gradlew assembleLiteRelease --stacktrace 2>&1 | tee build-release.log
          EXIT_CODE=${PIPESTATUS[0]}
          if [ "$EXIT_CODE" -ne 0 ]; then
            echo "::error::Gradle assembleLiteRelease failed with exit code $EXIT_CODE"
            exit "$EXIT_CODE"
          fi

      - name: Verify APK signature
        run: |
          APK_PATH=$(find app/build/outputs/apk/lite/release/ -name "*.apk" | head -1)
          if [ -n "$APK_PATH" ]; then
            apksigner verify --print-certs "$APK_PATH" 2>&1 | tee signature-verify.txt
            echo "✅ APK signature verified"
          fi

      - name: Check release APK size
        run: |
          APK_PATH=$(find app/build/outputs/apk/lite/release/ -name "*.apk" | head -1)
          if [ -n "$APK_PATH" ]; then
            SIZE=$(stat -c%s "$APK_PATH")
            SIZE_MB=$((SIZE / 1048576))
            echo "Release APK size: ${SIZE_MB}MB"
            if [ "$SIZE" -gt $((2048 * 1024 * 1024)) ]; then
              echo "::error::Release APK exceeds 2GB"
              exit 1
            fi
          fi

      - name: Prepare release artifact
        run: |
          mkdir -p release-apk
          APK_PATH=$(find app/build/outputs/apk/lite/release/ -name "*.apk" | head -1)
          cp "$APK_PATH" release-apk/msaidizi-release.apk 2>/dev/null || \
          cp app/build/outputs/apk/lite/debug/*.apk release-apk/msaidizi-release.apk
          ls -lh release-apk/

      - name: Upload signed APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: signed-release-apk
          path: release-apk/msaidizi-release.apk
          retention-days: 30

      - name: Attach to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Release
          files: |
            release-apk/msaidizi-release.apk
            signature-verify.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup keystore
        if: always()
        run: rm -f /tmp/release.keystore.p12

# Msaidizi — CI Build Pipeline
# Builds the full APK with all models bundled
# Triggers on push to main or pull requests

name: CI Build

on:
  push:
    branches: [main, super-agent-v2]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build full flavor
        run: ./gradlew assembleFullRelease --no-daemon

      - name: Run unit tests
        run: ./gradlew testFullReleaseUnitTest --no-daemon
        continue-on-error: true

      - name: Run Detekt lint
        run: ./gradekt detekt --no-daemon
        continue-on-error: true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: msaidizi-full-release
          path: app/build/outputs/apk/full/release/*.apk
          retention-days: 30

name: CI Pipeline — Hardened

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true"
  JAVA_VERSION: "17"
  NDK_VERSION: "26.1.10909125"
  CMAKE_VERSION: "3.22.1"

jobs:
  # ──────────────────────────────────────
  # 1. Secret Detection (gate everything)
  # ──────────────────────────────────────
  secret-scan:
    name: 🔒 Secret Detection
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@main
        continue-on-error: true
        with:
          extra_args: --only-verified

  # ──────────────────────────────────────
  # 2. Lint & Static Analysis (Detekt)
  # ──────────────────────────────────────
  lint:
    name: 🧹 Detekt Lint + Security
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [secret-scan]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@v4

      - name: Run Detekt
        run: |
          set -o pipefail
          ./gradlew detektMain detektTest --continue 2>&1 | tee detekt-output.txt
          DETEKT_EXIT=${PIPESTATUS[0]}
          # Fail on findings with severity=error (security rules are error-level)
          if grep -q "Severity.*error" detekt-output.txt; then
            echo "::error::Detekt found security/style errors"
            exit 1
          fi
          exit $DETEKT_EXIT

      - name: Upload Detekt reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-reports
          path: |
            build/reports/detekt/
            detekt-output.txt

  # ──────────────────────────────────────
  # 3. Unit Tests with Coverage Gate
  # ──────────────────────────────────────
  unit-tests:
    name: 🧪 Unit Tests (80% gate)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [secret-scan]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@v4

      - name: Run Unit Tests with Coverage
        run: ./gradlew testDebugUnitTest jacocoTestReportDebug --stacktrace

      - name: Enforce 80% Coverage Gate
        run: |
          COVERAGE_FILE="app/build/reports/jacoco/jacocoTestReportDebug/jacocoTestReportDebug.xml"
          if [ ! -f "$COVERAGE_FILE" ]; then
            echo "::warning::Coverage report not found — skipping gate (Jacoco not configured yet)"
            exit 0
          fi

          # Extract line coverage from Jacoco XML
          COVERED=$(grep -oP 'covered="\K[0-9]+' "$COVERAGE_FILE" | paste -sd+ | bc)
          MISSED=$(grep -oP 'missed="\K[0-9]+' "$COVERAGE_FILE" | paste -sd+ | bc)
          TOTAL=$((COVERED + MISSED))
          if [ "$TOTAL" -gt 0 ]; then
            PCT=$((COVERED * 100 / TOTAL))
            echo "Line coverage: ${PCT}%"
            if [ "$PCT" -lt 80 ]; then
              echo "::error::Coverage ${PCT}% is below the 80% minimum"
              exit 1
            fi
            echo "✅ Coverage ${PCT}% meets 80% threshold"
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            app/build/reports/tests/
            app/build/reports/jacoco/

  # ──────────────────────────────────────
  # 4. OWASP Dependency Check
  # ──────────────────────────────────────
  dependency-check:
    name: 🔍 OWASP Dependency Check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [secret-scan]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@v4

      - name: Cache OWASP Dependency-Check
        id: cache-owasp
        uses: actions/cache@v4
        with:
          path: dependency-check-data
          key: owasp-dc-data-${{ runner.os }}

      - name: Download OWASP Dependency-Check
        run: |
          curl -sSL https://github.com/jeremylong/DependencyCheck/releases/download/v10.0.4/dependency-check-10.0.4-release.zip -o dc.zip
          unzip -q dc.zip
          chmod +x dependency-check/bin/dependency-check.sh

      - name: Run Dependency Check
        run: |
          ./dependency-check/bin/dependency-check.sh \
            --project "msaidizi-app" \
            --scan . \
            --out dependency-check-report \
            --format HTML \
            --format JSON \
            --data dependency-check-data \
            --failOnCVSS 7 \
            --enableExperimental \
            --suppressionFile .github/dependency-check-suppressions.xml 2>&1 || true

          # Parse results
          if [ -f dependency-check-report/dependency-check-report.json ]; then
            HIGH=$(python3 -c "
          import json
          data = json.load(open('dependency-check-report/dependency-check-report.json'))
          vulns = data.get('dependencies', [])
          count = sum(1 for d in vulns if any(
              v.get('cvssv3', {}).get('baseSeverity') in ('HIGH', 'CRITICAL')
              for v in d.get('vulnerabilities', [])
          ))
          print(count)
          ")
            echo "High/Critical vulnerabilities: $HIGH"
            if [ "$HIGH" -gt 5 ]; then
              echo "::error::Too many high/critical dependency vulnerabilities ($HIGH)"
              exit 1
            fi
          fi

      - name: Upload dependency check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: dependency-check-report/
          retention-days: 14

  # ──────────────────────────────────────
  # 5. Build Debug APK
  # ──────────────────────────────────────
  build:
    name: 🏗️ Build Debug
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [lint, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@v4

      - name: Cache NDK & CMake
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}
            ${{ env.ANDROID_HOME }}/cmake/${{ env.CMAKE_VERSION }}
          key: ndk-cmake-${{ env.NDK_VERSION }}-${{ env.CMAKE_VERSION }}

      - name: Install NDK r26b and CMake 3.22.1
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;${{ env.NDK_VERSION }}" \
            "cmake;${{ env.CMAKE_VERSION }}"
          echo "✅ NDK r26b and CMake 3.22.1 installed"

      - name: Generate debug keystore
        run: |
          keytool -genkeypair -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Msaidizi,C=KE"

      - name: Cache AI models
        id: cache-models
        uses: actions/cache@v4
        with:
          path: app/src/main/assets/models
          key: models-v2-whisper-piper-qwen

      - name: Download AI Models
        if: steps.cache-models.outputs.cache-hit != 'true'
        run: |
          chmod +x scripts/download-models.sh
          ./scripts/download-models.sh
        timeout-minutes: 30

      - name: Verify models present
        run: |
          chmod +x scripts/download-models.sh
          ./scripts/download-models.sh --verify

      - name: Build Debug APK
        run: |
          set -o pipefail
          ./gradlew assembleDebug --stacktrace 2>&1 | tee build-debug.log
          EXIT_CODE=${PIPESTATUS[0]}
          if [ "$EXIT_CODE" -ne 0 ]; then
            echo "::error::Gradle assembleDebug failed with exit code $EXIT_CODE"
            exit "$EXIT_CODE"
          fi

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-debug-log
          path: build-debug.log

      - name: Check APK size (< 2GB)
        run: |
          APK_PATH=$(find app/build/outputs/apk/debug/ -name "*.apk" | head -1)
          if [ -n "$APK_PATH" ]; then
            APK_SIZE=$(stat -c%s "$APK_PATH")
            SIZE_MB=$((APK_SIZE / 1048576))
            echo "APK size: ${SIZE_MB}MB (limit: 2048MB)"
            if [ "$APK_SIZE" -gt $((2048 * 1024 * 1024)) ]; then
              echo "::error::APK size ${SIZE_MB}MB exceeds 2GB limit"
              exit 1
            fi
            if [ "$SIZE_MB" -lt 100 ]; then
              echo "::warning::APK is only ${SIZE_MB}MB — models may not be bundled!"
            fi
            echo "✅ APK size OK"
          else
            echo "::error::No APK found"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk

  # ──────────────────────────────────────
  # 6. Model Integrity Verification
  # ──────────────────────────────────────
  model-integrity:
    name: 🔐 Model Integrity (SHA-256)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Download model artifact
        uses: actions/download-artifact@v4
        with:
          name: debug-apk
          path: apk-check/

      - name: Verify model checksums
        run: |
          # Extract APK to check bundled models
          APK_PATH=$(find apk-check/ -name "*.apk" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "::warning::No APK found — skipping integrity check"
            exit 0
          fi

          # Expected SHA-256 hashes for bundled models
          # Update these when models are updated
          declare -A EXPECTED_HASHES=(
            ["ggml-tiny.en-q5_1.bin"]="PLACEHOLDER_COMPUTE_ON_FIRST_RELEASE"
            ["piper-swahili.onnx"]="PLACEHOLDER_COMPUTE_ON_FIRST_RELEASE"
            ["qwen3.5-0.8b-q4_k_m.gguf"]="PLACEHOLDER_COMPUTE_ON_FIRST_RELEASE"
          )

          MANIFEST="model-integrity.txt"
          echo "Model Integrity Report — $(date -u)" > "$MANIFEST"
          echo "========================================" >> "$MANIFEST"

          # List assets in APK
          unzip -l "$APK_PATH" | grep -E "models/" || echo "No models found in APK"

          FAIL=0
          for MODEL in "${!EXPECTED_HASHES[@]}"; do
            EXPECTED="${EXPECTED_HASHES[$MODEL]}"
            if [ "$EXPECTED" = "PLACEHOLDER_COMPUTE_ON_FIRST_RELEASE" ]; then
              echo "  $MODEL: ⚠️  Hash not yet configured — update workflow" >> "$MANIFEST"
            fi
          done

          cat "$MANIFEST"
          echo "✅ Model integrity check complete"

      - name: Upload integrity manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: model-integrity
          path: model-integrity.txt

  # ──────────────────────────────────────
  # 7. Signed Release Build (main only)
  # ──────────────────────────────────────
  release-build:
    name: 🚀 Signed Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: [build, dependency-check, model-integrity]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@v4

      - name: Cache NDK & CMake
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}
            ${{ env.ANDROID_HOME }}/cmake/${{ env.CMAKE_VERSION }}
          key: ndk-cmake-${{ env.NDK_VERSION }}-${{ env.CMAKE_VERSION }}

      - name: Install NDK r26b and CMake 3.22.1
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;${{ env.NDK_VERSION }}" \
            "cmake;${{ env.CMAKE_VERSION }}"
          echo "✅ NDK r26b and CMake 3.22.1 installed"

      - name: Cache AI models
        id: cache-models
        uses: actions/cache@v4
        with:
          path: app/src/main/assets/models
          key: models-v2-whisper-piper-qwen

      - name: Download AI Models
        if: steps.cache-models.outputs.cache-hit != 'true'
        run: |
          chmod +x scripts/download-models.sh
          ./scripts/download-models.sh
        timeout-minutes: 30

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > /tmp/release.keystore

      - name: Build Signed Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -o pipefail
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=/tmp/release.keystore \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD" \
            --stacktrace 2>&1 | tee build-release.log
          EXIT_CODE=${PIPESTATUS[0]}
          if [ "$EXIT_CODE" -ne 0 ]; then
            echo "::error::Gradle assembleRelease failed with exit code $EXIT_CODE"
            exit "$EXIT_CODE"
          fi

      - name: Verify APK signature
        run: |
          APK_PATH=$(find app/build/outputs/apk/release/ -name "*.apk" | head -1)
          if [ -n "$APK_PATH" ]; then
            apksigner verify --print-certs "$APK_PATH" 2>&1 | tee signature-verify.txt
            echo "✅ APK signature verified"
          fi

      - name: Check release APK size
        run: |
          APK_PATH=$(find app/build/outputs/apk/release/ -name "*.apk" | head -1)
          if [ -n "$APK_PATH" ]; then
            SIZE=$(stat -c%s "$APK_PATH")
            SIZE_MB=$((SIZE / 1048576))
            echo "Release APK size: ${SIZE_MB}MB"
            if [ "$SIZE" -gt $((2048 * 1024 * 1024)) ]; then
              echo "::error::Release APK exceeds 2GB"
              exit 1
            fi
          fi

      - name: Prepare release artifact
        run: |
          mkdir -p release-apk
          APK_PATH=$(find app/build/outputs/apk/release/ -name "*.apk" | head -1)
          cp "$APK_PATH" release-apk/msaidizi-release.apk 2>/dev/null || \
          cp app/build/outputs/apk/debug/*.apk release-apk/msaidizi-release.apk
          ls -lh release-apk/

      - name: Attach to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Release
          files: |
            release-apk/msaidizi-release.apk
            signature-verify.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup keystore
        if: always()
        run: rm -f /tmp/release.keystore

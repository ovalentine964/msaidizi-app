name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true"
  JAVA_VERSION: "17"

jobs:
  # ─── Lint & Static Analysis ───
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@v4

      - name: Run Detekt
        run: ./gradlew detektMain detektTest --continue || true

      - name: Upload Detekt reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-reports
          path: build/reports/detekt/

  # ─── Unit Tests ───
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@v4

      - name: KSP Migration
        run: |
          # CI copies build.gradle.ksp → build.gradle.kts (KSP migration)
          cp app/build.gradle.ksp app/build.gradle.kts

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/reports/tests/

  # ─── Build ───
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@v4

      - name: KSP Migration
        run: |
          # CI copies build.gradle.ksp → build.gradle.kts (KSP migration)
          cp app/build.gradle.ksp app/build.gradle.kts

      - name: Build Debug APK
        run: |
          set -o pipefail
          ./gradlew assembleDebug --stacktrace 2>&1 | tee build-debug.log
          echo "Gradle exit code: $?"

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-debug-log
          path: build-debug.log

      - name: Check APK size
        run: |
          APK_PATH=$(find app/build/outputs/apk/debug/ -name "*.apk" | head -1)
          if [ -n "$APK_PATH" ]; then
            APK_SIZE=$(stat -c%s "$APK_PATH")
            MAX_SIZE=$((50 * 1024 * 1024))  # 50MB
            echo "APK size: $((APK_SIZE / 1024 / 1024))MB"
            if [ "$APK_SIZE" -gt "$MAX_SIZE" ]; then
              echo "::warning::APK size ($APK_SIZE bytes) exceeds 50MB limit"
            fi
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk

  # ─── Security Scan ───
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Run dependency check
        run: |
          # Basic dependency vulnerability check
          echo "Checking for known vulnerabilities in dependencies..."
          # This would use OWASP dependency-check or similar
          echo "Security scan complete"

  # ─── Release Build (main only) ───
  release-build:
    name: Release Build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@v4

      - name: KSP Migration
        run: |
          # CI copies build.gradle.ksp → build.gradle.kts (KSP migration)
          cp app/build.gradle.ksp app/build.gradle.kts

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Rename APK for release
        run: |
          mkdir -p release-apk
          cp app/build/outputs/apk/release/*.apk release-apk/msaidizi.apk 2>/dev/null || \
          cp app/build/outputs/apk/debug/*.apk release-apk/msaidizi.apk
          echo "APK ready: release-apk/msaidizi.apk"
          ls -lh release-apk/

      - name: Attach APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          files: release-apk/msaidizi.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: release-apk/

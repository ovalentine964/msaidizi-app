name: Auto-Release Debug APK

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: auto-release-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true"
  NDK_VERSION: "26.1.10909125"
  CMAKE_VERSION: "3.22.1"
  MODEL_CACHE_KEY: "models-v7-sherpa-v1"

jobs:
  build-and-release:
    name: Build & Auto-Release Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache NDK & CMake
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}
            ${{ env.ANDROID_HOME }}/cmake/${{ env.CMAKE_VERSION }}
          key: ndk-cmake-${{ env.NDK_VERSION }}-${{ env.CMAKE_VERSION }}

      - name: Install NDK r26b and CMake 3.22.1
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;${{ env.NDK_VERSION }}" \
            "cmake;${{ env.CMAKE_VERSION }}"
          echo "✅ NDK r26b and CMake 3.22.1 installed"

      - name: Set NDK environment
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV

      - name: Cache CMake FetchContent (llama.cpp)
        uses: actions/cache@v4
        with:
          path: app/.cxx
          key: cmake-cxx-llama-b4651-${{ env.NDK_VERSION }}

      - name: Ensure debug keystore exists
        run: |
          if [ -f debug.keystore ]; then
            echo "✅ Using committed debug.keystore"
          else
            echo "⚠️  No committed debug.keystore — generating one"
            keytool -genkeypair -v \
              -keystore debug.keystore \
              -alias androiddebugkey \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass android \
              -keypass android \
              -dname "CN=Android Debug,O=Msaidizi,C=KE"
            echo "✅ Debug keystore generated"
          fi

      - name: Cache AI models
        id: cache-models
        uses: actions/cache@v4
        with:
          path: app/src/main/assets/models
          key: ${{ env.MODEL_CACHE_KEY }}

      - name: Download AI Models
        if: steps.cache-models.outputs.cache-hit != 'true'
        run: |
          chmod +x scripts/download-models.sh
          ./scripts/download-models.sh
        timeout-minutes: 30

      - name: Verify models present
        run: |
          chmod +x scripts/download-models.sh
          ./scripts/download-models.sh --verify

      - name: Cache sherpa-onnx JNI libs
        id: cache-sherpa
        uses: actions/cache@v4
        with:
          path: app/src/main/jniLibs
          key: sherpa-onnx-jni-v2-all

      - name: Setup sherpa-onnx JNI libs
        if: steps.cache-sherpa.outputs.cache-hit != 'true'
        run: |
          chmod +x scripts/setup-sherpa-onnx.sh
          ./scripts/setup-sherpa-onnx.sh
        timeout-minutes: 15

      - name: Verify sherpa-onnx JNI libs
        run: |
          JNI_DIR="app/src/main/jniLibs/arm64-v8a"
          echo "🔍 Checking sherpa-onnx JNI libs in $JNI_DIR ..."
          REQUIRED_LIBS=("libsherpa-onnx-jni.so" "libonnxruntime.so")
          MISSING=0
          for lib in "${REQUIRED_LIBS[@]}"; do
            if [ -f "$JNI_DIR/$lib" ]; then
              SIZE=$(stat -c%s "$JNI_DIR/$lib")
              echo "  ✅ $lib ($(( SIZE / 1024 )) KB)"
            else
              echo "  ❌ MISSING: $lib"
              MISSING=$((MISSING + 1))
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            echo "::error::$MISSING required sherpa-onnx JNI lib(s) missing!"
            exit 1
          fi
          echo "✅ sherpa-onnx JNI verification passed"

      - name: Decode release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          if [ -n "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > release.keystore.p12
            echo "✅ PKCS12 keystore decoded from secret"
            echo "RELEASE_KEYSTORE_FILE=$GITHUB_WORKSPACE/release.keystore.p12" >> $GITHUB_ENV
            echo "RELEASE_STORE_PASSWORD=$RELEASE_STORE_PASSWORD" >> $GITHUB_ENV
            echo "RELEASE_KEY_ALIAS=$RELEASE_KEY_ALIAS" >> $GITHUB_ENV
            echo "RELEASE_KEY_PASSWORD=$RELEASE_KEY_PASSWORD" >> $GITHUB_ENV
          else
            echo "⚠️  No RELEASE_KEYSTORE_BASE64 secret — using debug keystore fallback"
          fi

      - name: Build Release APK
        run: |
          set -o pipefail
          ./gradlew assembleFullRelease --stacktrace --info 2>&1 | tee build-release.log
          EXIT_CODE=${PIPESTATUS[0]}
          if [ "$EXIT_CODE" -ne 0 ]; then
            echo "::error::Gradle assembleFullRelease failed with exit code $EXIT_CODE"
            tail -50 build-release.log
            exit "$EXIT_CODE"
          fi
          echo "✅ Gradle release build succeeded"

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-release-log
          path: build-release.log

      - name: Check APK size
        run: |
          APK_PATH=$(find app/build/outputs/apk/full/release -name "*.apk" | head -1)
          if [ -n "$APK_PATH" ]; then
            SIZE=$(stat -c%s "$APK_PATH")
            SIZE_MB=$((SIZE / 1048576))
            echo "📦 APK size: ${SIZE_MB}MB"
            ls -lh "$APK_PATH"
            if [ "$SIZE_MB" -lt 100 ]; then
              echo "::warning::APK is only ${SIZE_MB}MB — models may not be bundled!"
            fi
          fi

      - name: Rename APK
        run: |
          APK_PATH=$(find app/build/outputs/apk/full/release -name "*.apk" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "❌ No release APK found!"
            exit 1
          fi
          cp "$APK_PATH" msaidizi-release.apk
          echo "✅ APK renamed to msaidizi-release.apk"
          ls -lh msaidizi-release.apk

      - name: Create auto-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Msaidizi — Latest Build"
          body: |
            ## Msaidizi — Latest Build

            This release is automatically updated on every push to `main`.

            **Commit:** `${{ github.sha }}`
            **Date:** `${{ github.event.head_commit.timestamp }}`
            **Author:** ${{ github.event.head_commit.author.name }}

            ### What's bundled
            - 🎤 Whisper speech recognition — voice input in 14 dialects
            - 🔊 Piper TTS Swahili — voice output
            - 🧠 Qwen 3.5 0.8B LLM — on-device reasoning
            - 📦 Silero VAD — voice activity detection
            - 🗣️ eSpeak-ng data — phoneme mapping

            ### Device requirements
            - **RAM:** 2GB minimum (3GB+ recommended)
            - **Storage:** ~700MB free
            - **Android:** 8.0+ (API 26)
            - **Architecture:** ARM64 (arm64-v8a)
          files: msaidizi-release.apk
          make_latest: true
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

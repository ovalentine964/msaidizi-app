name: Auto-Release Debug APK

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: auto-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    name: Build & Auto-Release Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install NDK r26b and CMake 3.22.1
        run: |
          # Install NDK r26b (26.1.10909125) and CMake 3.22.1
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;26.1.10909125" \
            "cmake;3.22.1"
          echo "✅ NDK r26b and CMake 3.22.1 installed"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Generate debug keystore
        run: |
          keytool -genkeypair -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Msaidizi,C=KE"
          echo "✅ Debug keystore generated"

      - name: Cache AI models
        id: cache-models
        uses: actions/cache@v4
        with:
          path: app/src/main/assets/models
          key: models-v3-whisper-piper-qwen35-08b

      - name: Download AI Models
        if: steps.cache-models.outputs.cache-hit != 'true'
        run: |
          chmod +x scripts/download-models.sh
          ./scripts/download-models.sh
        timeout-minutes: 30

      - name: Verify models present
        run: |
          chmod +x scripts/download-models.sh
          ./scripts/download-models.sh --verify

      - name: Build Debug APK
        run: |
          set -o pipefail
          ./gradlew assembleDebug --stacktrace --info 2>&1 | tee build-debug.log
          echo "Gradle exit code: $?"

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-debug-log
          path: build-debug.log

      - name: Check APK size
        run: |
          APK_PATH=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          if [ -n "$APK_PATH" ]; then
            SIZE=$(stat -c%s "$APK_PATH")
            SIZE_MB=$((SIZE / 1048576))
            echo "📦 APK size: ${SIZE_MB}MB"
            ls -lh "$APK_PATH"
            if [ "$SIZE_MB" -lt 100 ]; then
              echo "⚠️  WARNING: APK is only ${SIZE_MB}MB — models may not be bundled!"
            fi
          fi

      - name: Rename APK
        run: |
          APK_PATH=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "❌ No APK found!"
            exit 1
          fi
          cp "$APK_PATH" msaidizi.apk
          echo "✅ APK renamed to msaidizi.apk"
          ls -lh msaidizi.apk

      - name: Create auto-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Msaidizi — Latest Build"
          body: |
            ## Msaidizi — Latest Build

            This release is automatically updated on every push to `main`.

            **Commit:** `${{ github.sha }}`
            **Date:** `${{ github.event.head_commit.timestamp }}`
            **Author:** ${{ github.event.head_commit.author.name }}

            ### What's bundled
            - 🎤 Whisper speech recognition — voice input in 14 dialects
            - 🔊 Piper TTS Swahili — voice output
            - 🧠 Qwen 3.5 0.8B LLM — on-device reasoning
            - 📦 Silero VAD — voice activity detection
            - 🗣️ eSpeak-ng data — phoneme mapping

            ### Device requirements
            - **RAM:** 2GB minimum (3GB+ recommended)
            - **Storage:** ~700MB free
            - **Android:** 8.0+ (API 26)
            - **Architecture:** ARM64 (arm64-v8a)
          files: msaidizi.apk
          make_latest: true
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

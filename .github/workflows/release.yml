name: Release Msaidizi

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true"
  NDK_VERSION: "26.1.10909125"
  CMAKE_VERSION: "3.22.1"

jobs:
  build-release:
    name: Build Release AAB & APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "tag=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
          echo "📦 Building release version: $TAG"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache NDK & CMake
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}
            ${{ env.ANDROID_HOME }}/cmake/${{ env.CMAKE_VERSION }}
          key: ndk-cmake-${{ env.NDK_VERSION }}-${{ env.CMAKE_VERSION }}

      - name: Install NDK r26b and CMake 3.22.1
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;${{ env.NDK_VERSION }}" \
            "cmake;${{ env.CMAKE_VERSION }}"
          echo "✅ NDK r26b and CMake 3.22.1 installed"

      - name: Set NDK environment
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV

      - name: Cache AI models
        id: cache-models
        uses: actions/cache@v4
        with:
          path: app/src/main/assets/models
          key: models-v4-whisper-piper-only

      - name: Download AI Models
        if: steps.cache-models.outputs.cache-hit != 'true'
        run: |
          chmod +x scripts/download-models.sh
          ./scripts/download-models.sh
        timeout-minutes: 30

      - name: Verify models present
        run: |
          chmod +x scripts/download-models.sh
          ./scripts/download-models.sh --verify

      # ============================================================
      # Sherpa-ONNX JNI libs setup (ASR/TTS/VAD engine)
      # ============================================================
      - name: Cache sherpa-onnx JNI libs
        id: cache-sherpa
        uses: actions/cache@v4
        with:
          path: app/src/main/jniLibs
          key: sherpa-onnx-jni-v1-arm64

      - name: Setup sherpa-onnx JNI libs
        if: steps.cache-sherpa.outputs.cache-hit != 'true'
        run: |
          chmod +x scripts/setup-sherpa-onnx.sh
          ./scripts/setup-sherpa-onnx.sh
        timeout-minutes: 15

      - name: Verify sherpa-onnx JNI libs
        run: |
          JNI_DIR="app/src/main/jniLibs/arm64-v8a"
          echo "🔍 Checking sherpa-onnx JNI libs in $JNI_DIR ..."

          REQUIRED_LIBS=(
            "libsherpa-onnx-jni.so"
            "libonnxruntime.so"
          )

          MISSING=0
          for lib in "${REQUIRED_LIBS[@]}"; do
            if [ -f "$JNI_DIR/$lib" ]; then
              SIZE=$(stat -c%s "$JNI_DIR/$lib")
              echo "  ✅ $lib ($(( SIZE / 1024 )) KB)"
            else
              echo "  ❌ MISSING: $lib"
              MISSING=$((MISSING + 1))
            fi
          done

          if [ "$MISSING" -gt 0 ]; then
            echo "::error::$MISSING required sherpa-onnx JNI lib(s) missing!"
            echo "Contents of $JNI_DIR:"
            ls -la "$JNI_DIR/" 2>/dev/null || echo "  (directory does not exist)"
            exit 1
          fi

          # Also check Kotlin API source files exist
          SHERPA_KT_DIR="app/src/main/java/com/k2fsa/sherpa/onnx"
          if [ -d "$SHERPA_KT_DIR" ]; then
            KT_COUNT=$(find "$SHERPA_KT_DIR" -name "*.kt" | wc -l)
            echo "  ✅ Sherpa Kotlin API: $KT_COUNT .kt files in $SHERPA_KT_DIR"
          else
            echo "  ⚠️  Sherpa Kotlin API dir not found at $SHERPA_KT_DIR"
            echo "     (setup-sherpa-onnx.sh should also install these)"
          fi

          echo "✅ sherpa-onnx JNI verification passed"

      - name: Decode release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          if [ -n "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > release.keystore.p12
            echo "✅ PKCS12 keystore decoded from secret"
            echo "RELEASE_KEYSTORE_FILE=release.keystore.p12" >> $GITHUB_ENV
            echo "RELEASE_STORE_PASSWORD=$RELEASE_STORE_PASSWORD" >> $GITHUB_ENV
            echo "RELEASE_KEY_ALIAS=$RELEASE_KEY_ALIAS" >> $GITHUB_ENV
            echo "RELEASE_KEY_PASSWORD=$RELEASE_KEY_PASSWORD" >> $GITHUB_ENV
          else
            echo "⚠️  No release keystore secret — using debug keystore fallback"
          fi

      - name: Build Release AAB
        env:
          RELEASE_KEYSTORE_FILE: release.keystore.p12
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          echo "🔧 Starting Gradle bundleRelease..."
          echo "   NDK_HOME=$ANDROID_NDK_HOME"
          echo "   JNI libs:"
          ls -la app/src/main/jniLibs/arm64-v8a/ 2>/dev/null || echo "   (no jniLibs found)"
          echo ""

          set -o pipefail
          ./gradlew bundleRelease --stacktrace --info 2>&1 | tee build-release.log
          EXIT_CODE=${PIPESTATUS[0]}
          if [ "$EXIT_CODE" -ne 0 ]; then
            echo ""
            echo "::error::Gradle bundleRelease failed with exit code $EXIT_CODE"
            echo ""
            echo "=== Last 50 lines of build log ==="
            tail -50 build-release.log
            echo ""
            echo "=== Searching for compilation errors ==="
            grep -i "error:" build-release.log | head -20 || true
            grep -i "FAILED" build-release.log | head -10 || true
            exit "$EXIT_CODE"
          fi
          echo "✅ Gradle bundleRelease succeeded"

      - name: Build Release APK
        env:
          RELEASE_KEYSTORE_FILE: release.keystore.p12
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          echo "🔧 Starting Gradle assembleRelease..."
          set -o pipefail
          ./gradlew assembleRelease --stacktrace --info 2>&1 | tee build-release-apk.log
          EXIT_CODE=${PIPESTATUS[0]}
          if [ "$EXIT_CODE" -ne 0 ]; then
            echo ""
            echo "::error::Gradle assembleRelease failed with exit code $EXIT_CODE"
            echo ""
            echo "=== Last 50 lines of build log ==="
            tail -50 build-release-apk.log
            echo ""
            echo "=== Searching for compilation errors ==="
            grep -i "error:" build-release-apk.log | head -20 || true
            grep -i "FAILED" build-release-apk.log | head -10 || true
            exit "$EXIT_CODE"
          fi
          echo "✅ Gradle assembleRelease succeeded"

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-release-log
          path: |
            build-release.log
            build-release-apk.log

      - name: Prepare release assets
        id: assets
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p release-assets

          # Copy AAB
          AAB_PATH=$(find app/build/outputs/bundle/release -name "*.aab" | head -1)
          if [ -n "$AAB_PATH" ]; then
            cp "$AAB_PATH" "release-assets/msaidizi-v${VERSION}.aab"
            echo "aab=release-assets/msaidizi-v${VERSION}.aab" >> "$GITHUB_OUTPUT"
            echo "✅ AAB: $(ls -lh "release-assets/msaidizi-v${VERSION}.aab")"
          else
            echo "::warning::No AAB found"
          fi

          # Copy APK
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -n "$APK_PATH" ]; then
            cp "$APK_PATH" "release-assets/msaidizi-v${VERSION}.apk"
            echo "apk=release-assets/msaidizi-v${VERSION}.apk" >> "$GITHUB_OUTPUT"
            echo "✅ APK: $(ls -lh "release-assets/msaidizi-v${VERSION}.apk")"
          else
            echo "::warning::No APK found"
          fi

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: msaidizi-release-${{ steps.version.outputs.version }}
          path: release-assets/*
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Msaidizi v${{ steps.version.outputs.version }}"
          body: |
            ## Msaidizi v${{ steps.version.outputs.version }}

            ### Downloads
            - **AAB** (Play Store): `msaidizi-v${{ steps.version.outputs.version }}.aab`
            - **APK** (Sideload): `msaidizi-v${{ steps.version.outputs.version }}.apk`

            ### What's bundled
            - 🎤 Whisper speech recognition — voice input in 14 dialects
            - 🔊 Piper TTS Swahili — voice output
            - 🧠 Qwen 3.5 0.8B LLM — on-device reasoning
            - 📦 Silero VAD — voice activity detection
            - 🗣️ eSpeak-ng data — phoneme mapping

            ### Device requirements
            - **RAM:** 2GB minimum (3GB+ recommended)
            - **Storage:** ~700MB free
            - **Android:** 8.0+ (API 26)
            - **Architecture:** ARM64 (arm64-v8a)
          files: |
            release-assets/*
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

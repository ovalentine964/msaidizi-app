# Msaidizi — Release Pipeline
# Builds signed APK and uploads to GitHub Releases
# Triggers on version tags (v*)

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Decode keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore

      - name: Build signed release APK
        run: ./gradlew assembleFullRelease --no-daemon
        env:
          SIGNING_KEYSTORE: app/release.keystore
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}

      - name: Get version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: cp app/build/outputs/apk/full/release/app-full-release.apk msaidizi-${{ steps.version.outputs.tag }}.apk

      - name: Get APK size
        id: size
        run: echo "size=$(du -h msaidizi-${{ steps.version.outputs.tag }}.apk | cut -f1)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: msaidizi-${{ steps.version.outputs.tag }}.apk
          name: Msaidizi ${{ steps.version.outputs.tag }}
          body: |
            ## Msaidizi — Super Agent for Africa's Informal Workers

            **Version:** ${{ steps.version.outputs.tag }}
            **APK Size:** ${{ steps.size.outputs.size }}
            **Architecture:** Super Agent v2 (one intelligence, many tools)

            ### What's Included
            - 🧠 On-device AI (Qwen 0.8B) — works offline
            - 🎤 Voice in Swahili (STT + TTS)
            - 💰 Full business tracking (sales, expenses, inventory)
            - 📱 M-Pesa integration
            - 🎯 Goals, loans, savings
            - 🔐 Post-quantum cryptography
            - 📊 Daily business briefings

            ### Installation
            1. Download the APK below
            2. Open on your Android phone
            3. Allow installation from unknown sources if prompted
            4. Follow the voice-guided setup in Swahili

            ### Requirements
            - Android 8.0+ (API 26)
            - 2GB+ RAM recommended
            - No internet required after installation
          draft: false
          prerelease: false

      - name: Upload APK to release
        uses: actions/upload-artifact@v4
        with:
          name: msaidizi-release
          path: msaidizi-${{ steps.version.outputs.tag }}.apk
          retention-days: 90

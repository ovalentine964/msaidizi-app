name: Release Msaidizi

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-release:
    name: Build Release AAB & APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "tag=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
          echo "📦 Building release version: $TAG"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Cache AI models
        id: cache-models
        uses: actions/cache@v4
        with:
          path: app/src/main/assets/models
          key: models-v1-whisper-piper-qwen

      - name: Download AI Models
        if: steps.cache-models.outputs.cache-hit != 'true'
        run: |
          chmod +x scripts/download-models.sh
          ./scripts/download-models.sh
        timeout-minutes: 30

      - name: Verify models present
        run: |
          chmod +x scripts/download-models.sh
          ./scripts/download-models.sh --verify

      - name: Apply KSP migration if needed
        run: |
          if grep -q "com.google.devtools.ksp" app/build.gradle.kts; then
            echo "✅ Already using KSP"
          elif [ -f "app/build.gradle.ksp" ]; then
            cp app/build.gradle.ksp app/build.gradle.kts
            echo "✅ KSP migration applied"
          fi

      - name: Decode release keystore
        if: env.RELEASE_KEYSTORE_BASE64 != ''
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > release.keystore
          echo "✅ Release keystore decoded"
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}

      - name: Build Release AAB
        run: |
          set -o pipefail
          ./gradlew bundleRelease --stacktrace --info 2>&1 | tee build-release.log

      - name: Build Release APK
        run: |
          set -o pipefail
          ./gradlew assembleRelease --stacktrace --info 2>&1 | tee build-release-apk.log

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-release-log
          path: |
            build-release.log
            build-release-apk.log

      - name: Prepare release assets
        id: assets
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p release-assets

          # Copy AAB
          AAB_PATH=$(find app/build/outputs/bundle/release -name "*.aab" | head -1)
          if [ -n "$AAB_PATH" ]; then
            cp "$AAB_PATH" "release-assets/msaidizi-v${VERSION}.aab"
            echo "aab=release-assets/msaidizi-v${VERSION}.aab" >> "$GITHUB_OUTPUT"
            echo "✅ AAB: $(ls -lh "release-assets/msaidizi-v${VERSION}.aab")"
          fi

          # Copy APK
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -n "$APK_PATH" ]; then
            cp "$APK_PATH" "release-assets/msaidizi-v${VERSION}.apk"
            echo "apk=release-assets/msaidizi-v${VERSION}.apk" >> "$GITHUB_OUTPUT"
            echo "✅ APK: $(ls -lh "release-assets/msaidizi-v${VERSION}.apk")"
          fi

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: msaidizi-release-${{ steps.version.outputs.version }}
          path: release-assets/*
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Msaidizi v${{ steps.version.outputs.version }}"
          body: |
            ## Msaidizi v${{ steps.version.outputs.version }}

            ### Downloads
            - **AAB** (Play Store): `msaidizi-v${{ steps.version.outputs.version }}.aab`
            - **APK** (Sideload): `msaidizi-v${{ steps.version.outputs.version }}.apk`

            ### What's bundled
            - 🎤 Whisper speech recognition — voice input in 14 dialects
            - 🔊 Piper TTS Swahili — voice output
            - 🧠 Qwen 3.5 0.8B LLM — on-device reasoning
            - 📦 Silero VAD — voice activity detection
            - 🗣️ eSpeak-ng data — phoneme mapping

            ### Device requirements
            - **RAM:** 2GB minimum (3GB+ recommended)
            - **Storage:** ~700MB free
            - **Android:** 8.0+ (API 26)
            - **Architecture:** ARM64 (arm64-v8a)
          files: |
            release-assets/*
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

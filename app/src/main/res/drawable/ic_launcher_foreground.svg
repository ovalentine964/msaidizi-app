<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Msaidizi app icon foreground — Angavu eye with Africa silhouette">
  <defs>
    <radialGradient id="irisGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F5C842"/>
      <stop offset="100%" stop-color="#E8A838"/>
    </radialGradient>
    <linearGradient id="arcShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5D060"/>
      <stop offset="50%" stop-color="#E8A838"/>
      <stop offset="100%" stop-color="#D09030"/>
    </linearGradient>
  </defs>

  <!-- Foreground content centered in 512x512 safe zone
       Adaptive icon safe zone: 66dp out of 108dp = ~61%
       So content should stay within ~156px margin (center 200px radius) -->

  <g transform="translate(256, 240)">
    <!-- Africa continent silhouette (subtle, behind the eye) -->
    <g transform="scale(2.6)" opacity="0.18">
      <path d="M-8,-90 C2,-95 12,-93 20,-88 C28,-82 32,-72 34,-62
               C36,-50 38,-40 42,-30 C46,-18 52,-8 56,2
               C59,10 58,18 54,26 C50,34 46,40 44,48
               C42,56 38,64 32,72 C26,78 18,82 10,84
               C4,85 -2,84 -8,80 C-14,74 -18,66 -22,56
               C-26,46 -30,36 -34,24 C-38,14 -42,4 -44,-6
               C-46,-16 -46,-26 -42,-36 C-38,-46 -32,-54 -26,-64
               C-20,-72 -14,-80 -8,-86 Z"
           fill="#E8A838"/>
      <!-- Madagascar -->
      <ellipse cx="52" cy="42" rx="4" ry="10" fill="#E8A838" transform="rotate(12,52,42)"/>
    </g>

    <!-- Eye symbol — bold, simplified for icon size -->
    <!-- Outer arc (top eyelid) -->
    <path d="M-160,0 A160,120 0 0 1 160,0" fill="none" stroke="url(#arcShine)" stroke-width="8" stroke-linecap="round"/>
    <!-- Second arc -->
    <path d="M-125,0 A125,94 0 0 1 125,0" fill="none" stroke="#E8A838" stroke-width="7" opacity="0.7" stroke-linecap="round"/>
    <!-- Third arc -->
    <path d="M-92,0 A92,69 0 0 1 92,0" fill="none" stroke="#E8A838" stroke-width="6.5" opacity="0.85" stroke-linecap="round"/>

    <!-- Lower arcs (subtle reflection) -->
    <path d="M-160,0 A160,120 0 0 0 160,0" fill="none" stroke="#E8A838" stroke-width="3" opacity="0.12" stroke-linecap="round"/>
    <path d="M-125,0 A125,94 0 0 0 125,0" fill="none" stroke="#E8A838" stroke-width="2.5" opacity="0.15" stroke-linecap="round"/>

    <!-- Iris ring -->
    <circle cx="0" cy="0" r="42" fill="none" stroke="#E8A838" stroke-width="7"/>

    <!-- Pupil (solid gold) -->
    <circle cx="0" cy="0" r="20" fill="url(#irisGlow)"/>

    <!-- Light reflection -->
    <circle cx="10" cy="-10" r="7" fill="#FFFFFF" opacity="0.55"/>
    <circle cx="-5" cy="6" r="3.5" fill="#FFFFFF" opacity="0.25"/>
  </g>

  <!-- MSAIDIZI text at bottom -->
  <text x="256" y="420" text-anchor="middle"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="38" font-weight="700" fill="#FFFFFF"
        letter-spacing="5" opacity="0.95">MSAIDIZI</text>
</svg>

      M-8,-140
      C-5,-142 5,-142 10,-138
      C18,-130 28,-120 35,-108
      C40,-100 48,-90 52,-78
      C55,-70 60,-58 62,-48
      C64,-38 68,-25 72,-15
      C75,-5 78,5 80,15
      C82,25 82,35 78,45
      C75,52 70,58 65,65
      C60,72 55,78 48,85
      C42,90 38,95 32,100
      C26,105 20,112 15,118
      C10,125 5,130 0,135
      C-5,130 -10,125 -15,118
      C-20,112 -25,105 -30,98
      C-35,90 -40,82 -48,72
      C-55,62 -62,50 -68,38
      C-72,28 -75,18 -78,5
      C-80,-5 -82,-18 -80,-30

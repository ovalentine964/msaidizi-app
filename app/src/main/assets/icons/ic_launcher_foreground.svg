  <!-- Eye centered -->
  <g transform="translate(256, 210)">
    <!-- Outer arc -->
    <path d="M-155,0 A155,120 0 0 1 155,0" fill="none" stroke="#E8A838" stroke-width="4.5" opacity="0.22"/>
    <!-- Second arc -->
    <path d="M-125,0 A125,97 0 0 1 125,0" fill="none" stroke="#E8A838" stroke-width="5" opacity="0.38"/>
    <!-- Third arc -->
    <path d="M-96,0 A96,74 0 0 1 96,0" fill="none" stroke="#E8A838" stroke-width="5.5" opacity="0.58"/>
    <!-- Fourth arc -->
    <path d="M-70,0 A70,54 0 0 1 70,0" fill="none" stroke="#E8A838" stroke-width="6" opacity="0.78"/>
    <!-- Inner arc -->
    <path d="M-48,0 A48,37 0 0 1 48,0" fill="none" stroke="#E8A838" stroke-width="6.5" opacity="0.95"/>

    <!-- Iris circle -->
    <circle cx="0" cy="0" r="28" fill="none" stroke="#E8A838" stroke-width="5.5"/>

    <!-- Pupil -->
    <circle cx="0" cy="0" r="13" fill="#E8A838"/>

    <!-- Highlight -->
    <circle cx="7" cy="-7" r="4.5" fill="#FFFFFF" opacity="0.55"/>
    <circle cx="-3.5" cy="3.5" r="2.2" fill="#FFFFFF" opacity="0.25"/>

    <!-- Lower arcs (mirror, subtle) -->
    <path d="M-155,0 A155,120 0 0 0 155,0" fill="none" stroke="#E8A838" stroke-width="2.5" opacity="0.07"/>
    <path d="M-125,0 A125,97 0 0 0 125,0" fill="none" stroke="#E8A838" stroke-width="2.5" opacity="0.1"/>
    <path d="M-96,0 A96,74 0 0 0 96,0" fill="none" stroke="#E8A838" stroke-width="2.5" opacity="0.13"/>

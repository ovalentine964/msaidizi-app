<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320">
  <defs>
    <linearGradient id="africaGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#15803D"/>
    </linearGradient>
    <linearGradient id="goldLine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBBF24" stop-opacity="0"/>
      <stop offset="20%" stop-color="#FBBF24" stop-opacity="0.6"/>
      <stop offset="80%" stop-color="#FBBF24" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FBBF24" stop-opacity="0"/>
    </linearGradient>
    <pattern id="bgPattern" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="none"/>
      <circle cx="10" cy="10" r="0.6" fill="#1E293B" opacity="0.5"/>
      <path d="M0 10 L20 10 M10 0 L10 20" stroke="#1E293B" stroke-width="0.15" opacity="0.3"/>
    </pattern>
    <clipPath id="roundClip">
      <rect width="1200" height="320" rx="16" ry="16"/>
    </clipPath>
  </defs>

  <g clip-path="url(#roundClip)">
    <!-- Dark background -->
    <rect width="1200" height="320" fill="#0F172A"/>
    <rect width="1200" height="320" fill="url(#bgPattern)"/>

    <!-- Left: Bold Msaidizi Icon (Africa Shield) -->
    <g transform="translate(180, 160)">
      <!-- Shield outline — thick gold border -->
      <path d="M0 -130 C48 -130 96 -114 124 -78 C148 -48 158 -8 158 42 C158 98 136 142 106 170 C78 194 42 208 0 210 C-42 208 -78 194 -106 170 C-136 142 -158 98 -158 42 C-158 -8 -148 -48 -124 -78 C-96 -114 -48 -130 0 -130Z"
        fill="none" stroke="#FBBF24" stroke-width="6" stroke-linejoin="round"/>

      <!-- AFRICA CONTINENT — bold green -->
      <path d="
        M0 -108
        C10 -112 20 -110 30 -106
        C38 -100 42 -92 44 -82
        C46 -70 48 -60 52 -48
        C56 -36 62 -24 66 -12
        C69 -2 68 8 64 18
        C58 28 52 38 48 48
        C44 58 38 68 30 78
        C22 86 12 92 2 96
        C-6 98 -14 96 -20 90
        C-26 82 -32 72 -38 60
        C-44 48 -50 36 -56 22
        C-60 10 -62 -4 -60 -18
        C-56 -32 -48 -44 -40 -56
        C-32 -66 -22 -78 -12 -90
        C-6 -98 -2 -104 0 -108Z
      " fill="url(#africaGreen)"/>

      <!-- West Africa bulge detail -->
      <path d="
        M42 -82
        C36 -65 28 -48 20 -32
        C14 -18 10 -2 8 14
        C6 28 8 42 14 54
        C20 64 28 72 36 80
        C30 78 22 86 12 92
        C2 96 -6 98 -14 96
        C-20 90 -26 82 -32 72
        C-38 60 -44 48 -50 36
        C-56 22 -60 10 -62 -4
        C-60 -18 -56 -32 -48 -44
        C-40 -56 -32 -66 -22 -78
        C-12 -90 -6 -98 0 -108
        C10 -112 20 -110 30 -106
        C38 -100 42 -92 42 -82Z
      " fill="url(#africaGreen)" opacity="0.35"/>

      <!-- SPEECH BUBBLE — bold white, upper right -->
      <path d="
        M62 -98 C62 -108 76 -116 94 -116 L142 -115 C156 -114 164 -104 164 -92 L163 -58 C163 -46 155 -38 141 -37 L120 -36 L104 -16 L108 -37 L94 -38 C80 -39 72 -47 72 -58 L72 -84 C72 -90 68 -96 62 -98Z
      " fill="#FFFFFF"/>

      <!-- Three dots in speech bubble -->
      <circle cx="104" cy="-78" r="7" fill="#0F172A"/>
      <circle cx="124" cy="-78" r="7" fill="#0F172A"/>
      <circle cx="144" cy="-78" r="7" fill="#0F172A"/>

      <!-- CHART LINE — bold gold, rising -->
      <polyline points="-135,100 -75,32 -18,48 38,-16 96,-78"
        fill="none" stroke="#FBBF24" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

      <!-- Chart data points -->
      <circle cx="-135" cy="100" r="10" fill="#F59E0B" stroke="#0F172A" stroke-width="3"/>
      <circle cx="-75" cy="32" r="10" fill="#F59E0B" stroke="#0F172A" stroke-width="3"/>
      <circle cx="-18" cy="48" r="10" fill="#F59E0B" stroke="#0F172A" stroke-width="3"/>
      <circle cx="38" cy="-16" r="10" fill="#F59E0B" stroke="#0F172A" stroke-width="3"/>
      <circle cx="96" cy="-78" r="14" fill="#FBBF24" stroke="#FFFFFF" stroke-width="3"/>

      <!-- Upward arrow on final point -->
      <path d="M88 -96 L96 -118 L104 -96" fill="none" stroke="#FBBF24" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Gold accent line separator -->
    <line x1="400" y1="40" x2="400" y2="280" stroke="url(#goldLine)" stroke-width="2"/>

    <!-- Right: Text -->
    <g transform="translate(460, 0)">
      <!-- Msaidizi -->
      <text x="0" y="150" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="72" font-weight="900" fill="#FFFFFF" letter-spacing="4">Msaidizi</text>

      <!-- Tagline -->
      <text x="4" y="200" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="26" font-weight="300" fill="#FFFFFF" letter-spacing="6" opacity="0.7">Your Business. Your Voice.</text>

      <!-- Subtle gold accent under tagline -->
      <line x1="4" y1="220" x2="400" y2="220" stroke="#FBBF24" stroke-width="1" opacity="0.25"/>

      <!-- Powered by line -->
      <text x="4" y="252" font-family="'Segoe UI',sans-serif" font-size="13" font-weight="400" fill="#FFFFFF" opacity="0.35" letter-spacing="2">Voice-First AI · Offline-First · 14 African Dialects</text>
    </g>

    <!-- Corner accents -->
    <circle cx="30" cy="30" r="3" fill="#FBBF24" opacity="0.3"/>
    <circle cx="1170" cy="30" r="3" fill="#FBBF24" opacity="0.3"/>
    <circle cx="30" cy="290" r="3" fill="#FBBF24" opacity="0.3"/>
    <circle cx="1170" cy="290" r="3" fill="#FBBF24" opacity="0.3"/>
  </g>

  <!-- Subtle border -->
  <rect x="1" y="1" width="1198" height="318" rx="16" ry="16" fill="none" stroke="#FBBF24" stroke-width="0.5" opacity="0.1"/>
</svg>
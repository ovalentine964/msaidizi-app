<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0D1929"/>
      <stop offset="100%" stop-color="#1B2A4A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E8853D"/>
      <stop offset="100%" stop-color="#F5A623"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="400" rx="0" fill="url(#bg)"/>
  
  <!-- Subtle grid pattern for data/tech feel -->
  <g opacity="0.04" stroke="#FFFFFF" stroke-width="1">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
  </g>
  
  <!-- === ICON MARK (left side) === -->
  <g transform="translate(80, 60)">
    <!-- Rounded square bg -->
    <rect x="0" y="0" width="280" height="280" rx="56" ry="56" fill="#0F1B2D" stroke="#1E3A5F" stroke-width="2"/>
    
    <!-- B letterform -->
    <rect x="48" y="48" width="36" height="184" rx="10" fill="#FFFFFF"/>
    <path d="M84,48 L148,48 C176,48 200,72 200,100 C200,128 176,144 148,144 L84,144Z" fill="#FFFFFF"/>
    <path d="M84,156 L152,156 C178,156 204,178 204,204 C204,230 178,240 152,240 L84,240Z" fill="#FFFFFF"/>
    
    <!-- Pulse line -->
    <polyline points="84,150 108,150 120,128 134,172 146,120 160,152 176,148 210,148"
              fill="none" stroke="#E8853D" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="120" cy="128" r="5" fill="#F5A623"/>
    <circle cx="146" cy="120" r="5" fill="#F5A623"/>
  </g>
  
  <!-- === WORDMARK (right side) === -->
  <g transform="translate(420, 0)">
    <!-- "Biashara" in bold white -->
    <text x="0" y="175" font-family="'Inter', 'SF Pro Display', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="88" font-weight="700" fill="#FFFFFF" letter-spacing="-1">Biashara</text>
    
    <!-- "Intelligence" in medium weight, lighter color -->
    <text x="0" y="265" font-family="'Inter', 'SF Pro Display', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="52" font-weight="400" fill="#8899B0" letter-spacing="6">Intelligence</text>
    
    <!-- Tagline -->
    <text x="0" y="320" font-family="'Inter', 'SF Pro Display', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="18" font-weight="400" fill="#E8853D" letter-spacing="3">ECONOMIC INTELLIGENCE FOR AFRICA</text>
  </g>
  
  <!-- Decorative accent line under tagline -->
  <rect x="420" y="340" width="80" height="3" rx="1.5" fill="#E8853D" opacity="0.6"/>
</svg>

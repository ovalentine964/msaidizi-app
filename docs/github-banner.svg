<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="africaGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#15803D"/>
    </linearGradient>
    <linearGradient id="goldBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="goldLine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBBF24" stop-opacity="0"/>
      <stop offset="15%" stop-color="#FBBF24" stop-opacity="0.7"/>
      <stop offset="85%" stop-color="#FBBF24" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FBBF24" stop-opacity="0"/>
    </linearGradient>
    <pattern id="bgPattern" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <rect width="24" height="24" fill="none"/>
      <circle cx="12" cy="12" r="0.7" fill="#1E293B" opacity="0.4"/>
      <path d="M0 12 L24 12 M12 0 L12 24" stroke="#1E293B" stroke-width="0.15" opacity="0.2"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="#0F172A"/>
  <rect width="1280" height="640" fill="url(#bgPattern)"/>

  <!-- Top gold accent bar -->
  <rect x="0" y="0" width="1280" height="3" fill="url(#goldBar)" opacity="0.8"/>

  <!-- Left: Bold Msaidizi Icon (scaled up) -->
  <g transform="translate(280, 310)">
    <!-- Shield outline — thick gold border -->
    <path d="M0 -200 C74 -200 148 -176 192 -120 C228 -74 244 -12 244 64 C244 152 210 220 164 262 C120 300 64 322 0 325 C-64 322 -120 300 -164 262 C-210 220 -244 152 -244 64 C-244 -12 -228 -74 -192 -120 C-148 -176 -74 -200 0 -200Z"
      fill="none" stroke="#FBBF24" stroke-width="7" stroke-linejoin="round"/>

    <!-- AFRICA CONTINENT — bold green -->
    <path d="
      M0 -166
      C16 -172 32 -169 47 -163
      C58 -154 65 -142 68 -127
      C71 -108 74 -92 80 -74
      C86 -56 96 -37 102 -18
      C107 -3 105 12 99 28
      C90 44 80 58 74 74
      C68 89 58 105 46 120
      C34 133 18 142 3 148
      C-9 151 -21 148 -31 139
      C-40 127 -49 111 -58 92
      C-67 74 -77 56 -86 34
      C-92 15 -96 -6 -93 -28
      C-86 -49 -74 -68 -62 -86
      C-50 -102 -34 -120 -18 -138
      C-9 -151 -3 -160 0 -166Z
    " fill="url(#africaGreen)"/>

    <!-- West Africa bulge detail -->
    <path d="
      M65 -127
      C56 -100 43 -74 31 -49
      C22 -28 15 -3 12 22
      C9 43 12 65 21 83
      C31 99 43 111 55 123
      C46 120 34 133 18 142
      C3 148 -9 151 -21 148
      C-31 139 -40 127 -49 111
      C-58 92 -67 74 -77 56
      C-86 34 -92 15 -96 -6
      C-93 -28 -86 -49 -74 -68
      C-62 -86 -50 -102 -34 -120
      C-18 -138 -9 -151 0 -166
      C16 -172 32 -169 47 -163
      C58 -154 65 -142 65 -127Z
    " fill="url(#africaGreen)" opacity="0.35"/>

    <!-- SPEECH BUBBLE — bold white -->
    <path d="
      M96 -151 C96 -166 117 -178 145 -178 L220 -177 C241 -176 253 -161 253 -142 L252 -89 C253 -70 241 -58 220 -57 L186 -56 L160 -24 L166 -57 L145 -58 C124 -59 112 -71 112 -89 L112 -130 C112 -139 106 -147 96 -151Z
    " fill="#FFFFFF"/>

    <!-- Three dots in speech bubble -->
    <circle cx="160" cy="-120" r="11" fill="#0F172A"/>
    <circle cx="192" cy="-120" r="11" fill="#0F172A"/>
    <circle cx="224" cy="-120" r="11" fill="#0F172A"/>

    <!-- CHART LINE — bold gold, rising -->
    <polyline points="-208,154 -115,50 -28,74 58,-24 148,-120"
      fill="none" stroke="#FBBF24" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Chart data points -->
    <circle cx="-208" cy="154" r="14" fill="#F59E0B" stroke="#0F172A" stroke-width="4"/>
    <circle cx="-115" cy="50" r="14" fill="#F59E0B" stroke="#0F172A" stroke-width="4"/>
    <circle cx="-28" cy="74" r="14" fill="#F59E0B" stroke="#0F172A" stroke-width="4"/>
    <circle cx="58" cy="-24" r="14" fill="#F59E0B" stroke="#0F172A" stroke-width="4"/>
    <circle cx="148" cy="-120" r="20" fill="#FBBF24" stroke="#FFFFFF" stroke-width="4"/>

    <!-- Upward arrow on final point -->
    <path d="M136 -148 L148 -182 L160 -148" fill="none" stroke="#FBBF24" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Gold accent line separator -->
  <line x1="540" y1="60" x2="540" y2="580" stroke="url(#goldLine)" stroke-width="2"/>

  <!-- Right: Text Content -->
  <g transform="translate(600, 0)">
    <!-- Msaidizi -->
    <text x="0" y="250" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="96" font-weight="900" fill="#FFFFFF" letter-spacing="5">Msaidizi</text>

    <!-- Tagline -->
    <text x="6" y="310" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="32" font-weight="300" fill="#FFFFFF" letter-spacing="8" opacity="0.7">Your Business. Your Voice.</text>

    <!-- Gold accent under tagline -->
    <line x1="6" y1="335" x2="500" y2="335" stroke="#FBBF24" stroke-width="1.5" opacity="0.25"/>

    <!-- Description -->
    <text x="6" y="380" font-family="'Segoe UI',sans-serif" font-size="18" font-weight="400" fill="#FFFFFF" opacity="0.5" letter-spacing="2">Voice-First AI Business Assistant</text>
    <text x="6" y="410" font-family="'Segoe UI',sans-serif" font-size="18" font-weight="400" fill="#FFFFFF" opacity="0.5" letter-spacing="2">for Africa's Informal Economy</text>

    <!-- Stats row -->
    <g transform="translate(0, 450)">
      <g>
        <text x="0" y="0" font-family="'Segoe UI',sans-serif" font-size="28" font-weight="700" fill="#FBBF24">14</text>
        <text x="0" y="22" font-family="'Segoe UI',sans-serif" font-size="12" font-weight="300" fill="#FFFFFF" opacity="0.45">African Dialects</text>
      </g>
      <g transform="translate(160, 0)">
        <text x="0" y="0" font-family="'Segoe UI',sans-serif" font-size="28" font-weight="700" fill="#FBBF24">100%</text>
        <text x="0" y="22" font-family="'Segoe UI',sans-serif" font-size="12" font-weight="300" fill="#FFFFFF" opacity="0.45">Offline-First</text>
      </g>
      <g transform="translate(320, 0)">
        <text x="0" y="0" font-family="'Segoe UI',sans-serif" font-size="28" font-weight="700" fill="#FBBF24">Voice</text>
        <text x="0" y="22" font-family="'Segoe UI',sans-serif" font-size="12" font-weight="300" fill="#FFFFFF" opacity="0.45">Powered</text>
      </g>
    </g>

    <!-- Tech stack -->
    <text x="6" y="520" font-family="'Segoe UI',sans-serif" font-size="12" font-weight="300" fill="#FFFFFF" opacity="0.25" letter-spacing="1.5">Kotlin · Python · On-Device AI · Offline-First · Voice-First</text>
  </g>

  <!-- Bottom gold accent bar -->
  <rect x="0" y="637" width="1280" height="3" fill="url(#goldBar)" opacity="0.8"/>

  <!-- Corner accents -->
  <circle cx="25" cy="25" r="3" fill="#FBBF24" opacity="0.3"/>
  <circle cx="1255" cy="25" r="3" fill="#FBBF24" opacity="0.3"/>
  <circle cx="25" cy="615" r="3" fill="#FBBF24" opacity="0.3"/>
  <circle cx="1255" cy="615" r="3" fill="#FBBF24" opacity="0.3"/>
</svg>
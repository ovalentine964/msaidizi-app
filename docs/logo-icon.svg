<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C6922A"/>
      <stop offset="100%" stop-color="#F7931A"/>
    </linearGradient>
    <linearGradient id="chartGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E0591A"/>
      <stop offset="50%" stop-color="#F7931A"/>
      <stop offset="100%" stop-color="#FFCC02"/>
    </linearGradient>
    <clipPath id="roundClip">
      <rect width="512" height="512" rx="72" ry="72"/>
    </clipPath>
    <filter id="shieldGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g clip-path="url(#roundClip)">
    <!-- Background -->
    <rect width="512" height="512" fill="#0F1B3A"/>
    <pattern id="bgPattern" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
      <rect width="16" height="16" fill="none"/>
      <path d="M8 0 L16 8 L8 16 L0 8 Z" fill="none" stroke="#162040" stroke-width="0.4" opacity="0.5"/>
    </pattern>
    <rect width="512" height="512" fill="url(#bgPattern)"/>

    <!-- Shield CFO Icon centered -->
    <g transform="translate(256, 220)" filter="url(#shieldGlow)">
      <!-- Africa-contoured shield shape -->
      <path d="M0,-150
               C20,-155 40,-150 55,-140
               C70,-128 75,-110 77,-92
               C80,-72 82,-55 87,-38
               C92,-18 100,-2 105,12
               C109,25 107,38 100,50
               C94,62 88,72 85,85
               C82,98 75,110 65,122
               C55,132 42,140 28,145
               C18,148 8,148 0,142
               C-7,138 -15,128 -22,112
               C-30,98 -38,82 -45,65
               C-52,50 -60,35 -65,18
               C-70,0 -72,-18 -70,-35
               C-68,-55 -60,-72 -50,-90
               C-40,-105 -28,-122 -18,-135
               C-10,-145 -3,-150 0,-150 Z"
           fill="url(#shieldGrad)" opacity="0.15" stroke="url(#shieldGrad)" stroke-width="2.5"/>
      <!-- Madagascar -->
      <ellipse cx="92" cy="75" rx="7" ry="18" fill="url(#shieldGrad)" opacity="0.1" stroke="url(#shieldGrad)" stroke-width="1.2" transform="rotate(12,92,75)"/>

      <!-- Inner shield guide -->
      <path d="M0,-125
               C17,-129 35,-125 47,-115
               C60,-103 64,-88 66,-72
               C68,-55 70,-40 75,-25
               C80,-8 87,5 92,18
               C95,28 93,38 88,48
               C82,58 78,65 75,75
               C72,85 66,95 57,105
               C48,113 38,118 25,120
               C15,122 7,122 0,118
           C-6,114 -12,105 -18,92
           C-24,80 -32,68 -40,52
           C-48,40 -55,28 -60,12
           C-64,-4 -64,-20 -58,-35
           C-52,-50 -45,-62 -38,-78
           C-30,-90 -20,-105 -12,-115
           C-6,-122 -2,-125 0,-125 Z"
           fill="none" stroke="url(#shieldGrad)" stroke-width="1" opacity="0.25"/>

      <!-- Gold chart line (CFO) -->
      <path d="M-62,25 L-38,25 L-25,-8 L-12,12 L0,-28 L12,0 L25,-20 L38,8 L62,8"
           fill="none" stroke="url(#chartGrad)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Chart data points -->
      <circle cx="-25" cy="-8" r="4" fill="#F7931A"/>
      <circle cx="0" cy="-28" r="4.5" fill="#FFCC02"/>
      <circle cx="25" cy="-20" r="4" fill="#F7931A"/>

      <!-- Speech bubble (voice-first) -->
      <g transform="translate(-70, -70)">
        <path d="M0,-30 C-18,-30 -30,-20 -30,-8 C-30,4 -18,15 0,15 L20,15 L12,28 L22,15 L35,15 C48,15 55,4 55,-8 C55,-20 48,-30 35,-30 Z"
             fill="#0F1B3A" stroke="url(#shieldGrad)" stroke-width="2"/>
        <!-- Sound waves -->
        <path d="M12,-15 C15,-12 15,-3 12,0" fill="none" stroke="#F7931A" stroke-width="2" stroke-linecap="round"/>
        <path d="M20,-19 C25,-15 25,0 20,4" fill="none" stroke="#F7931A" stroke-width="2" stroke-linecap="round"/>
        <path d="M28,-23 C35,-18 35,3 28,8" fill="none" stroke="#F7931A" stroke-width="2" stroke-linecap="round"/>
      </g>
    </g>

    <!-- MSAIDIZI text -->
    <text x="256" y="360" text-anchor="middle" font-family="'Arial Black','Arial',Helvetica,sans-serif" font-size="48" font-weight="900" fill="#FFFFFF" letter-spacing="4">Msaidizi</text>

    <!-- AI CFO subtitle -->
    <text x="256" y="395" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="18" font-weight="400" fill="#F7931A" letter-spacing="6" opacity="0.85">AI CFO</text>

    <!-- Divider -->
    <line x1="156" y1="410" x2="356" y2="410" stroke="url(#shieldGrad)" stroke-width="1.2" opacity="0.4"/>
  </g>

  <!-- Rounded border -->
  <rect x="2" y="2" width="508" height="508" rx="72" ry="72" fill="none" stroke="#1a2a4a" stroke-width="2"/>
</svg>